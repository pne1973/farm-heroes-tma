<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Granja Pro - Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f4f7f6;
            --tg-theme-button-color: #2481cc;
            --primary: #2ecc71;
            --secondary: #e67e22;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            margin: 0; padding: 15px;
            color: #333;
            user-select: none;
        }

        .header-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }

        .card span { font-size: 0.75rem; color: #888; text-transform: uppercase; display: block; }
        .card b { font-size: 1.2rem; color: var(--tg-theme-button-color); }

        .main-display {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .resource-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        #feed-bar-inner {
            height: 100%;
            background: var(--secondary);
            width: 100%;
            transition: width 0.3s;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .btn-sell { background: var(--primary); color: white; }
        .btn-feed { background: var(--secondary); color: white; }
        .btn-upgrade { background: #eee; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .inventory-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
        }

        h3 { margin: 20px 0 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="card">
            <span>Ovos em Stock</span>
            <b id="egg-count">0</b>
        </div>
        <div class="card">
            <span>Saldo</span>
            <b id="cash-count">0.00€</b>
        </div>
    </div>

    <div class="main-display">
        <div class="inventory-info">
            <span>🐔 Galinhas: <b id="chicken-count">1</b>/<span id="max-chickens">5</span></span>
            <span>🏠 Galinheiros: <b id="coop-count">1</b></span>
        </div>
        
        <span>Stock de Ração</span>
        <div class="resource-bar">
            <div id="feed-bar-inner"></div>
        </div>
        <button class="btn btn-feed" onclick="buyFeed()">Comprar Ração (5.00€)</button>
        <button class="btn btn-sell" onclick="sellEggs()">Vender Ovos (0.15€/un)</button>
    </div>

    <h3>Gestão da Quinta</h3>
    
    <button class="btn btn-upgrade" id="buy-chicken-btn" onclick="buyChicken()">
        <span>+1 Galinha</span>
        <b id="cost-chicken">20.00€</b>
    </button>

    <button class="btn btn-upgrade" id="buy-coop-btn" onclick="buyCoop()">
        <span>+1 Galinheiro (+5 vagas)</span>
        <b id="cost-coop">100.00€</b>
    </button>

    <button class="btn btn-upgrade" id="upgrade-feed-btn" onclick="upgradeFeed()">
        <span>Melhorar Qualidade Ração</span>
        <b id="cost-feed-level">50.00€</b>
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let farm = {
            eggs: 0,
            cash: 5.00, // Começa com algum dinheiro para ração inicial
            chickens: 1,
            coops: 1,
            feed: 100, // Porcentagem
            feedQuality: 1, // Multiplicador de produção
            
            prices: {
                chicken: 20,
                coop: 100,
                feedLevel: 50,
                eggValue: 0.15,
                feedRefill: 5
            }
        };

        function updateUI() {
            document.getElementById('egg-count').innerText = Math.floor(farm.eggs);
            document.getElementById('cash-count').innerText = farm.cash.toFixed(2) + "€";
            document.getElementById('chicken-count').innerText = farm.chickens;
            document.getElementById('coop-count').innerText = farm.coops;
            document.getElementById('max-chickens').innerText = farm.coops * 5;
            document.getElementById('feed-bar-inner').style.width = farm.feed + "%";

            // Atualizar Botões
            document.getElementById('buy-chicken-btn').disabled = (farm.cash < farm.prices.chicken || farm.chickens >= farm.coops * 5);
            document.getElementById('buy-coop-btn').disabled = (farm.cash < farm.prices.coop);
            document.getElementById('upgrade-feed-btn').disabled = (farm.cash < farm.prices.feedLevel);
        }

        // Loop de Produção
        setInterval(() => {
            if (farm.feed > 0 && farm.chickens > 0) {
                // Cada galinha consome ração e produz ovos
                let consumption = 0.5 * farm.chickens;
                farm.feed = Math.max(0, farm.feed - consumption);
                
                // Produção baseada na qualidade da ração
                farm.eggs += (farm.chickens * 0.1 * farm.feedQuality);
                updateUI();
            }
        }, 1000);

        function sellEggs() {
            if (farm.eggs >= 1) {
                farm.cash += Math.floor(farm.eggs) * farm.prices.eggValue;
                farm.eggs = 0;
                updateUI();
            }
        }

        function buyFeed() {
            if (farm.cash >= farm.prices.feedRefill) {
                farm.cash -= farm.prices.feedRefill;
                farm.feed = 100;
                updateUI();
            }
        }

        function buyChicken() {
            if (farm.cash >= farm.prices.chicken && farm.chickens < farm.coops * 5) {
                farm.cash -= farm.prices.chicken;
                farm.chickens++;
                farm.prices.chicken = Math.round(farm.prices.chicken * 1.2);
                document.getElementById('cost-chicken').innerText = farm.prices.chicken.toFixed(2) + "€";
                updateUI();
            }
        }

        function buyCoop() {
            if (farm.cash >= farm.prices.coop) {
                farm.cash -= farm.prices.coop;
                farm.coops++;
                farm.prices.coop = Math.round(farm.prices.coop * 1.5);
                document.getElementById('cost-coop').innerText = farm.prices.coop.toFixed(2) + "€";
                updateUI();
            }
        }

        function upgradeFeed() {
            if (farm.cash >= farm.prices.feedLevel) {
                farm.cash -= farm.prices.feedLevel;
                farm.feedQuality += 0.5;
                farm.prices.feedLevel = Math.round(farm.prices.feedLevel * 2);
                document.getElementById('cost-feed-level').innerText = farm.prices.feedLevel.toFixed(2) + "€";
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
