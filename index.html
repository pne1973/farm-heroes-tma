<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.52 - FINAL THEME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; --brown: #8d6e63; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-between; padding-bottom: 25px; }

        /* MOCK ADS OTIMIZADOS */
        .mock-ad { width: 320px; height: 50px; background: #eee; border: 1px dashed #bbb; color: #999; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 5px; }

        /* DASHBOARD COMPACTO */
        #stats { width: 92%; background: var(--white); border-radius: 12px; display: flex; justify-content: space-around; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin: 5px 0; }
        .v { font-size: 16px; font-weight: 800; color: var(--accent); display: block; }
        .l { font-size: 9px; text-transform: uppercase; color: #666; font-weight: 700; }

        #res-bar { font-size: 12px; font-weight: bold; padding: 4px 15px; background: rgba(255,255,255,0.6); border-radius: 20px; }

        /* JOGO SEM ESPAÇOS VAZIOS */
        #game-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(7, 44px); grid-template-rows: repeat(7, 44px); 
            gap: 4px; padding: 10px; background: var(--brown); border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); touch-action: none;
        }
        .cell { 
            width: 44px; height: 44px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .cell img { width: 34px; height: 34px; pointer-events: none; transition: transform 0.2s; }
        .dragging { opacity: 0.5; transform: scale(0.8); }

        /* BOOSTERS */
        #boosters { display: flex; gap: 10px; margin-top: 15px; }
        .b-btn { background: var(--white); padding: 8px 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 0 #eee; }

        #admin-footer { width: 100%; background: #202124; color: #fff; padding: 6px 0; font-size: 9px; text-align: center; position: fixed; bottom: 0; z-index: 100; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="mock-ad">BANNER TOPO</div>

    <div id="stats">
        <div style="text-align:center"><span class="l">Nível</span><span class="v">1</span></div>
        <div style="text-align:center"><span class="l">Saldo</span><span class="v" id="bal-ui">€ 0.0000</span></div>
        <div style="text-align:center"><span class="l">Ações</span><span class="v" style="color:var(--red)" id="act-ui">21</span></div>
    </div>

    <div id="res-bar">🥛 0 | 🥚 0 | 🧶 0 | 🍯 0</div>

    <div id="game-area">
        <div id="grid"></div>
        <div id="boosters">
            <div class="btn b-btn">💣 BOMBA</div>
            <div class="btn b-btn">🚜 TRATOR</div>
            <div class="btn b-btn">⛏️ PÁ</div>
        </div>
    </div>

    <div class="mock-ad" style="margin-bottom: 30px;">BANNER FUNDO</div>

    <div id="admin-footer">ADMIN: 5401881400 | v33.52 | ANIMALS THEME FIX</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // ÍCONES OFICIAIS DA QUINTA
    const farmIcons = [
        'https://cdn-icons-png.flaticon.com/128/1998/1998592.png', // Vaca
        'https://cdn-icons-png.flaticon.com/128/1998/1998610.png', // Galinha
        'https://cdn-icons-png.flaticon.com/128/1998/1998620.png', // Ovelha
        'https://cdn-icons-png.flaticon.com/128/1998/1998601.png', // Porco
        'https://cdn-icons-png.flaticon.com/128/4028/4028682.png'  // Abelha
    ];

    let cells = [];
    let actions = 21;
    let balance = 0.0000;
    let draggedItem = null;

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            const type = Math.floor(Math.random() * farmIcons.length);
            cell.dataset.type = type;
            cell.innerHTML = `<img src="${farmIcons[type]}" draggable="false">`;
            
            // Eventos de Toque/Arrasto para Telemóvel
            cell.addEventListener('touchstart', handleStart);
            cell.addEventListener('touchmove', handleMove);
            cell.addEventListener('touchend', handleEnd);
            
            grid.appendChild(cell);
            cells.push(cell);
        }
    }

    let startX, startY;

    function handleStart(e) {
        if (actions <= 0) return;
        draggedItem = this;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        this.querySelector('img').classList.add('dragging');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function handleMove(e) { e.preventDefault(); }

    function handleEnd(e) {
        if (!draggedItem) return;
        draggedItem.querySelector('img').classList.remove('dragging');
        
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const diffX = endX - startX;
        const diffY = endY - startY;
        
        let targetIdx = -1;
        const currentIdx = parseInt(draggedItem.dataset.idx);

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (Math.abs(diffX) > 20) targetIdx = diffX > 0 ? currentIdx + 1 : currentIdx - 1;
        } else {
            if (Math.abs(diffY) > 20) targetIdx = diffY > 0 ? currentIdx + 7 : currentIdx - 7;
        }

        if (targetIdx >= 0 && targetIdx < 49) {
            const targetCell = cells[targetIdx];
            // Validar se é vizinho real (evitar saltos de linha)
            const isNeighbor = [1, -1, 7, -7].includes(currentIdx - targetIdx);
            if (isNeighbor) {
                swap(draggedItem, targetCell);
                actions--;
                updateUI();
                tg.HapticFeedback.notificationOccurred('success');
                checkMatches();
            }
        }
        draggedItem = null;
    }

    function swap(c1, c2) {
        const t1 = c1.dataset.type;
        const h1 = c1.innerHTML;
        c1.dataset.type = c2.dataset.type;
        c1.innerHTML = c2.innerHTML;
        c2.dataset.type = t1;
        c2.innerHTML = h1;
    }

    function checkMatches() {
        // Lógica de Match-3 básica para explosão
        let toExplode = new Set();
        // (Lógica simplificada para feedback imediato)
        // ... (será expandida na próxima versão de gravidade)
    }

    function updateUI() {
        document.getElementById('act-ui').innerText = actions;
        document.getElementById('bal-ui').innerText = `€ ${balance.toFixed(4)}`;
    }

    init();
</script>
</body>
</html>
