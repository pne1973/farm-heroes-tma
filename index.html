<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ouro da Quinta v35.05 - FINAL FIX</title>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --brown: #8d6e63; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* UI SUPERIOR */
        #header { background: white; padding: 15px; display: flex; justify-content: space-around; border-bottom: 1px solid #ddd; z-index: 10; }
        .stat { text-align: center; }
        .stat b { display: block; color: var(--accent); font-size: 18px; }

        /* AREA DE JOGO SEM BLOQUEIOS */
        #game { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 45px); 
            gap: 5px; 
            background: var(--brown); 
            padding: 10px; 
            border-radius: 12px;
            pointer-events: all !important; /* Força interação */
        }
        .cell { 
            width: 45px; 
            height: 45px; 
            background: #fff9c4; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 25px; 
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        /* CRITICAL FIX: O emoji não pode intercetar o clique */
        .cell span { pointer-events: none; } 

        #btn-ad { background: #4285f4; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* ADMIN PANEL */
        #admin { display: none; position: fixed; inset: 0; background: #f4f4f4; z-index: 1000; padding: 20px; overflow-y: auto; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<button onclick="toggleAdmin()" style="position:fixed; top:10px; right:10px; z-index:100; background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:50px; font-size:10px;">AUDITORIA ⚙️</button>

<div id="header">
    <div class="stat"><small>ID</small><b id="ui-id">5401881400</b></div>
    <div class="stat"><small>SALDO</small><b id="ui-bal">€ 0.0000</b></div>
    <div class="stat"><small>AÇÕES</small><b id="ui-act">20</b></div>
</div>

<div id="game">
    <div class="grid" id="grid"></div>
    <button id="btn-ad" onclick="viewAd()">VER ANÚNCIO (+€0.0010 Rev)</button>
</div>

<div id="admin">
    <h2>PAINEL DE AUDITORIA MASTER</h2>
    <div class="card">
        <h4>Trocar Utilizador de Teste</h4>
        <button onclick="switchUser('5401881400')">Admin</button>
        <button onclick="switchUser('808476')">User 808476</button>
        <button onclick="switchUser(Math.floor(Math.random()*999999))">Novo Aleatório</button>
    </div>
    <div class="card">
        <p>Receita Global Ads: <b id="adm-rev">€ 0.0000</b></p>
        <p>Total User Balances: <b id="adm-pass">€ 0.0000</b></p>
    </div>
    <button onclick="toggleAdmin()" style="width:100%; padding:15px; background:black; color:white; border-radius:10px;">FECHAR</button>
</div>

<script>
    const items = ['🥛', '🥚', '🍯', '🚜'];
    let currentId = "5401881400";
    let rev = 0, totalSaldos = 0;
    let users = { "5401881400": { bal: 0, act: 20 } };

    function createGrid() {
        const g = document.getElementById('grid');
        g.innerHTML = '';
        for(let i=0; i<49; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.innerHTML = `<span>${items[Math.floor(Math.random()*4)]}</span>`;
            // Uso de mousedown e touchstart para garantir resposta imediata
            c.addEventListener('mousedown', play);
            c.addEventListener('touchstart', (e) => { e.preventDefault(); play(); });
            g.appendChild(c);
        }
        refresh();
    }

    function play() {
        let u = users[currentId];
        if(u.act > 0) {
            u.act--;
            u.bal += 0.0005;
            totalSaldos += 0.0005;
            refresh();
        } else {
            alert("Ações esgotadas! Vê um anúncio.");
        }
    }

    function viewAd() {
        rev += 0.0010;
        users[currentId].act += 10;
        alert("Anúncio visto com sucesso!");
        refresh();
    }

    function switchUser(id) {
        if(!users[id]) users[id] = { bal: 0, act: 20 };
        currentId = id.toString();
        refresh();
        toggleAdmin();
    }

    function toggleAdmin() {
        const a = document.getElementById('admin');
        a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }

    function refresh() {
        document.getElementById('ui-id').innerText = currentId;
        document.getElementById('ui-bal').innerText = `€ ${users[currentId].bal.toFixed(4)}`;
        document.getElementById('ui-act').innerText = users[currentId].act;
        document.getElementById('adm-rev').innerText = `€ ${rev.toFixed(4)}`;
        document.getElementById('adm-pass').innerText = `€ ${totalSaldos.toFixed(4)}`;
    }

    window.onload = createGrid;
</script>
</body>
</html>
