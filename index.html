<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Match Rewards</title>

<style>
/* ============================
   ESTILO BASE
   ============================ */

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
}

.app-shell {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 20px;
  padding: 20px;
}

/* Painéis */
#game-panel, #admin-panel {
  width: 100%;
}

/* Esconde admin por defeito no mobile */
#admin-panel {
  display: none;
}

/* Título */
h1 {
  margin: 0 0 10px 0;
  font-size: 22px;
}

/* Espaço publicitário */
.ad-banner {
  width: 320px;
  height: 50px;
  background: #333;
  border: 1px solid #555;
  margin: 10px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* Grid do jogo */
.grid {
  display: grid;
  grid-template-columns: repeat(8, 40px);
  gap: 4px;
  margin-top: 10px;
}

.cell {
  width: 40px;
  height: 40px;
  background: #222;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

/* Painel Admin */
.right-panel {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

/* ============================
   BARRA INFERIOR (C3)
   ============================ */

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  border-top: 1px solid #444;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom-nav button {
  background: #222;
  color: #fff;
  border: 1px solid #555;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 16px;
}

/* ============================
   MODO TELEGRAM / MOBILE
   ============================ */

@media (max-width: 600px) {

  .app-shell {
    grid-template-columns: 1fr !important;
    padding-bottom: 80px;
  }

  .right-panel {
    width: 100% !important;
  }

  .grid {
    grid-template-columns: repeat(8, 34px);
  }

  .cell {
    font-size: 20px !important;
  }

  .ad-banner {
    width: 100%;
    max-width: 320px;
  }
}
</style>

</head>
<body>

<div class="app-shell">

  <!-- ============================
       PAINEL DO JOGO
       ============================ -->
  <div id="game-panel">

    <h1>FARM MATCH REWARDS</h1>

    <!-- Espaço Publicitário 320x50 -->
    <div class="ad-banner">Espaço Publicitário 320×50</div>

    <!-- Grid do jogo -->
    <div class="grid" id="gameGrid"></div>

  </div>

  <!-- ============================
       PAINEL ADMIN
       ============================ -->
  <div id="admin-panel" class="right-panel">
    <h2>Painel Admin</h2>
    <p>Economia · Utilizadores · Estatísticas</p>

    <div id="adminContent">
      <p>Saldo Emitido: 0.0003 €</p>
      <p>Anúncios vistos: 0</p>
      <p>Matches totais: 0</p>
    </div>
  </div>

</div>

<!-- ============================
     BARRA INFERIOR
     ============================ -->
<div class="bottom-nav">
  <button onclick="showGame()">Jogo</button>
  <button onclick="showAdmin()">Admin</button>
</div>

<script>
/* ============================
   FUNÇÕES DE ALTERNÂNCIA
   ============================ */

function showGame() {
  document.getElementById("game-panel").style.display = "block";
  document.getElementById("admin-panel").style.display = "none";
}

function showAdmin() {
  document.getElementById("game-panel").style.display = "none";
  document.getElementById("admin-panel").style.display = "block";
}

/* ============================
   GERA GRID DO JOGO
   ============================ */

const items = ["🥚","🍅","🥕","🌽"];
const grid = document.getElementById("gameGrid");

for (let i = 0; i < 64; i++) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.textContent = items[Math.floor(Math.random() * items.length)];
  grid.appendChild(cell);
}
</script>

</body>
</html>
