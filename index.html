<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.53 - MATCH SYSTEM FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; --brown: #8d6e63; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-between; padding-bottom: 20px; }

        .mock-ad { width: 320px; height: 50px; background: #eee; border: 1px dashed #bbb; color: #999; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 5px; }

        #stats { width: 92%; background: var(--white); border-radius: 12px; display: flex; justify-content: space-around; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin: 5px 0; }
        .v { font-size: 16px; font-weight: 800; color: var(--accent); display: block; }
        .l { font-size: 9px; text-transform: uppercase; color: #666; font-weight: 700; }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(7, 44px); grid-template-rows: repeat(7, 44px); 
            gap: 4px; padding: 10px; background: var(--brown); border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); position: relative;
        }
        .cell { 
            width: 44px; height: 44px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .cell img { width: 34px; height: 34px; transition: transform 0.2s, opacity 0.2s; }

        /* Animação de Explosão */
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }
        .match-anim img { animation: explode 0.4s ease-out forwards; }

        #boosters { display: flex; gap: 10px; margin-top: 15px; }
        .b-btn { background: var(--white); padding: 8px 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; }

        #admin-footer { width: 100%; background: #202124; color: #fff; padding: 6px 0; font-size: 9px; text-align: center; position: fixed; bottom: 0; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="mock-ad">BANNER EXEMPLO</div>

    <div id="stats">
        <div style="text-align:center"><span class="l">Nível</span><span class="v">1</span></div>
        <div style="text-align:center"><span class="l">Saldo</span><span class="v" id="bal-ui">€ 0.0000</span></div>
        <div style="text-align:center"><span class="l">Ações</span><span class="v" style="color:var(--red)" id="act-ui">21</span></div>
    </div>

    <div id="game-area">
        <div id="grid"></div>
        <div id="boosters">
            <div class="b-btn">💣 BOMBA</div>
            <div class="b-btn">🚜 TRATOR</div>
            <div class="b-btn">⛏️ PÁ</div>
        </div>
    </div>

    <div class="mock-ad" style="margin-bottom: 30px;">BANNER EXEMPLO</div>
    <div id="admin-footer">ADMIN: 5401881400 | v33.53 | MATCH LOGIC FIXED</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const farmIcons = [
        'https://cdn-icons-png.flaticon.com/128/1998/1998592.png', // Vaca
        'https://cdn-icons-png.flaticon.com/128/1998/1998610.png', // Galinha
        'https://cdn-icons-png.flaticon.com/128/1998/1998620.png', // Ovelha
        'https://cdn-icons-png.flaticon.com/128/1998/1998601.png', // Porco
        'https://cdn-icons-png.flaticon.com/128/4028/4028682.png'  // Abelha
    ];

    let cells = [];
    let actions = 21;
    let balance = 0.0000;
    let startCell = null;
    let startX, startY;

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        cells = [];
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            fillCell(cell);
            cell.addEventListener('touchstart', e => {
                if(actions <= 0) return;
                startCell = cell;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            });
            cell.addEventListener('touchend', handleTouchEnd);
            grid.appendChild(cell);
            cells.push(cell);
        }
        // Limpeza inicial de matches sem gastar ações
        while(findMatches().length > 0) {
            findMatches().forEach(idx => fillCell(cells[idx]));
        }
    }

    function fillCell(cell) {
        const type = Math.floor(Math.random() * farmIcons.length);
        cell.dataset.type = type;
        cell.innerHTML = `<img src="${farmIcons[type]}" draggable="false">`;
    }

    function handleTouchEnd(e) {
        if (!startCell || actions <= 0) return;
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const diffX = endX - startX;
        const diffY = endY - startY;
        const currentIdx = parseInt(startCell.dataset.idx);
        let targetIdx = -1;

        if (Math.abs(diffX) > 30) targetIdx = diffX > 0 ? currentIdx + 1 : currentIdx - 1;
        else if (Math.abs(diffY) > 30) targetIdx = diffY > 0 ? currentIdx + 7 : currentIdx - 7;

        if (targetIdx >= 0 && targetIdx < 49 && isNeighbor(currentIdx, targetIdx)) {
            swap(cells[currentIdx], cells[targetIdx]);
            const matches = findMatches();
            if (matches.length > 0) {
                actions--;
                processMatches(matches);
            } else {
                // Reverte se não houver match
                setTimeout(() => swap(cells[currentIdx], cells[targetIdx]), 250);
            }
        }
        startCell = null;
    }

    function isNeighbor(i1, i2) {
        const dist = Math.abs(i1 - i2);
        if (dist === 7) return true;
        if (dist === 1 && Math.floor(i1/7) === Math.floor(i2/7)) return true;
        return false;
    }

    function swap(c1, c2) {
        const t1 = c1.dataset.type;
        const h1 = c1.innerHTML;
        c1.dataset.type = c2.dataset.type;
        c1.innerHTML = c2.innerHTML;
        c2.dataset.type = t1;
        c2.innerHTML = h1;
    }

    function findMatches() {
        let matches = new Set();
        // Horizontais
        for (let r = 0; r < 7; r++) {
            for (let c = 0; c < 5; c++) {
                let i = r * 7 + c;
                if (cells[i].dataset.type === cells[i+1].dataset.type && cells[i].dataset.type === cells[i+2].dataset.type) {
                    matches.add(i); matches.add(i+1); matches.add(i+2);
                }
            }
        }
        // Verticais
        for (let c = 0; c < 7; c++) {
            for (let r = 0; r < 5; r++) {
                let i = r * 7 + c;
                if (cells[i].dataset.type === cells[i+7].dataset.type && cells[i].dataset.type === cells[i+14].dataset.type) {
                    matches.add(i); matches.add(i+7); matches.add(i+14);
                }
            }
        }
        return Array.from(matches);
    }

    function processMatches(matchedIndices) {
        tg.HapticFeedback.notificationOccurred('success');
        balance += (matchedIndices.length * 0.0005);
        updateUI();

        matchedIndices.forEach(idx => cells[idx].classList.add('match-anim'));

        setTimeout(() => {
            matchedIndices.forEach(idx => {
                cells[idx].classList.remove('match-anim');
                fillCell(cells[idx]); // Em v34 implementaremos a gravidade real
            });
            const nextMatches = findMatches();
            if (nextMatches.length > 0) processMatches(nextMatches);
        }, 400);
    }

    function updateUI() {
        document.getElementById('act-ui').innerText = actions;
        document.getElementById('bal-ui').innerText = `€ ${balance.toFixed(4)}`;
    }

    init();
</script>
</body>
</html>
