<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ouro da Quinta - Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #fcf3cf; /* Creme Suave */
            --wood: #5d4037; /* Madeira Escura */
            --accent: #d4ac0d; /* Dourado Trigo */
            --panel: rgba(93, 64, 55, 0.1);
        }

        body {
            margin: 0; padding: 0; background: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; color: var(--wood);
            touch-action: none; /* Bloqueia scroll para o drag funcionar 100% */
        }

        /* Top Header */
        #header {
            width: 90%; background: white;
            margin-top: 15px; border-radius: 20px;
            display: flex; justify-content: space-around;
            padding: 12px; border: 4px solid var(--wood);
            box-shadow: 0 4px 0 var(--wood);
        }

        .stat { text-align: center; }
        .stat-label { font-size: 11px; text-transform: uppercase; font-weight: bold; color: #8d6e63; }
        .stat-value { font-size: 22px; font-weight: 900; color: var(--wood); }

        /* Mission Bar - Produtos Gourmet */
        #mission-bar {
            display: flex; gap: 20px; margin: 15px 0;
            background: var(--wood); color: white;
            padding: 8px 25px; border-radius: 30px;
            font-size: 18px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Game Board - Estilo Cesta de Palha */
        #grid {
            display: grid;
            grid-template-columns: repeat(7, 46px);
            grid-template-rows: repeat(7, 46px);
            gap: 5px; padding: 10px;
            background: #a1887f; border: 6px solid var(--wood);
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        .cell {
            width: 46px; height: 46px; background: #efebe9;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 28px;
            user-select: none; transition: transform 0.1s;
            position: relative;
        }

        /* Popups */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(93, 64, 55, 0.9); flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;
        }

        .btn {
            padding: 15px 45px; font-size: 18px; border: none;
            border-radius: 50px; background: #ffa000; color: white;
            font-weight: bold; cursor: pointer; margin-top: 25px;
            box-shadow: 0 5px 0 #e65100; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat">
            <div class="stat-label">Ações</div>
            <div id="moves-val" class="stat-value">20</div>
        </div>
        <div class="stat">
            <div class="stat-label">Pontos</div>
            <div id="score-val" class="stat-value">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Melhor</div>
            <div id="best-val" class="stat-value">0</div>
        </div>
    </div>

    <div id="mission-bar">
        <div>🧀 <span id="m-cheese">10</span></div>
        <div>🍯 <span id="m-honey">5</span></div>
        <div>🥚 <span id="m-egg">15</span></div>
    </div>

    <div id="grid"></div>

    <div id="overlay">
        <h1 id="status-msg" style="font-size: 45px;">Produção Concluída!</h1>
        <p id="status-desc" style="font-size: 20px;">Sua cesta está cheia.</p>
        <button class="btn" onclick="location.reload()">NOVA COLHEITA</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const grid = document.querySelector('#grid');
    const products = ['🧀', '🍯', '🥚', '🍞', '🥛'];
    const width = 7;
    let squares = [];
    let moves = 20;
    let score = 0;
    let highScore = 0;
    
    // Metas da Quinta
    let mission = { '🧀': 10, '🍯': 5, '🥚': 15 };

    // Recuperar Recorde
    tg.CloudStorage.getItem('farm_best', (err, value) => {
        if (!err && value) {
            highScore = parseInt(value);
            document.getElementById('best-val').innerText = highScore;
        }
    });

    function init() {
        for (let i = 0; i < width * width; i++) {
            const square = document.createElement('div');
            square.setAttribute('id', i);
            square.classList.add('cell');
            square.innerHTML = products[Math.floor(Math.random() * products.length)];
            grid.appendChild(square);
            squares.push(square);

            // Mecânica de Drag (Arrastar)
            square.addEventListener('touchstart', dragStart, {passive: false});
            square.addEventListener('touchend', dragEnd, {passive: false});
        }
        updateUI();
    }

    let startX, startY, startId;

    function dragStart(e) {
        startId = parseInt(this.id);
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        this.style.transform = "scale(1.2)";
        this.style.backgroundColor = "#fff";
    }

    function dragEnd(e) {
        this.style.transform = "scale(1)";
        this.style.backgroundColor = "#efebe9";
        
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const diffX = endX - startX;
        const diffY = endY - startY;

        let targetId = startId;
        const threshold = 30; // Sensibilidade do arrasto

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > threshold && startId % width < width - 1) targetId = startId + 1;
            else if (diffX < -threshold && startId % width > 0) targetId = startId - 1;
        } else {
            if (diffY > threshold && startId < width * (width - 1)) targetId = startId + width;
            else if (diffY < -threshold && startId >= width) targetId = startId - width;
        }

        if (targetId !== startId && moves > 0) {
            swap(startId, targetId);
            moves--;
            checkAllMatches();
            updateUI();
        }
    }

    function swap(id1, id2) {
        let temp = squares[id1].innerHTML;
        squares[id1].innerHTML = squares[id2].innerHTML;
        squares[id2].innerHTML = temp;
    }

    function checkAllMatches() {
        let matched = false;
        for (let i = 0; i < 49; i++) {
            let item = squares[i].innerHTML;
            if (item === '') continue;

            // Horizontal
            if (i % width < 5 && squares[i+1].innerHTML === item && squares[i+2].innerHTML === item) {
                [i, i+1, i+2].forEach(idx => squares[idx].setAttribute('match', true));
                matched = true;
            }
            // Vertical
            if (i < 35 && squares[i+width].innerHTML === item && squares[i+width*2].innerHTML === item) {
                [i, i+width, i+width*2].forEach(idx => squares[idx].setAttribute('match', true));
                matched = true;
            }
        }

        if (matched) {
            tg.HapticFeedback.impactOccurred('medium');
            collect();
        }
    }

    function collect() {
        squares.forEach(s => {
            if (s.getAttribute('match')) {
                let type = s.innerHTML;
                if (mission[type] !== undefined) mission[type]--;
                s.innerHTML = '';
                s.removeAttribute('match');
                score += 20;
            }
        });
        setTimeout(applyGravity, 250);
    }

    function applyGravity() {
        for (let i = 0; i < width; i++) {
            let col = [];
            for (let j = 0; j < width; j++) {
                let val = squares[i + (j * width)].innerHTML;
                if (val !== '') col.push(val);
            }
            while (col.length < width) {
                col.unshift(products[Math.floor(Math.random() * products.length)]);
            }
            for (let j = 0; j < width; j++) {
                squares[i + (j * width)].innerHTML = col[j];
            }
        }
        setTimeout(checkAllMatches, 300);
        updateUI();
    }

    function updateUI() {
        document.getElementById('moves-val').innerText = moves;
        document.getElementById('score-val').innerText = score;
        document.getElementById('m-cheese').innerText = Math.max(0, mission['🧀']);
        document.getElementById('m-honey').innerText = Math.max(0, mission['🍯']);
        document.getElementById('m-egg').innerText = Math.max(0, mission['🥚']);

        if (score > highScore) {
            highScore = score;
            document.getElementById('best-val').innerText = highScore;
            tg.CloudStorage.setItem('farm_best', highScore.toString());
        }

        if (mission['🧀'] <= 0 && mission['🍯'] <= 0 && mission['🥚'] <= 0) endGame(true);
        else if (moves <= 0) endGame(false);
    }

    function endGame(win) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('status-msg').innerText = win ? "SUCESSO! 🧺" : "ESTOQUE ESGOTADO! 🏮";
        document.getElementById('status-desc').innerText = win ? "Você entregou todos os pedidos da quinta!" : "Faltaram ingredientes para os pedidos.";
    }

    init();
</script>
</body>
</html>
