<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.66 - STRESS TEST MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; --brown: #8d6e63; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: var(--bg); font-family: sans-serif; }

        #app-shell { display: flex; flex-direction: column; height: 100%; align-items: center; justify-content: space-between; padding: 10px 0 30px 0; }

        .mock-ad { width: 320px; height: 50px; background: #eee; border: 1px dashed #bbb; color: #999; font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }

        #stats-row { width: 92%; display: flex; justify-content: space-between; gap: 8px; }
        .stat-card { background: var(--white); padding: 8px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .v { font-size: 14px; font-weight: 800; color: var(--accent); display: block; }
        .l { font-size: 8px; text-transform: uppercase; color: #666; font-weight: 700; }

        #goals-bar { background: var(--white); padding: 8px 20px; border-radius: 25px; display: flex; gap: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .goal-item { display: flex; align-items: center; gap: 5px; font-weight: 800; font-size: 14px; }
        .goal-item img { width: 22px; height: 22px; }

        #grid { 
            display: grid; grid-template-columns: repeat(7, 42px); grid-template-rows: repeat(7, 42px); 
            gap: 4px; padding: 10px; background: var(--brown); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .cell { width: 42px; height: 42px; background: #fff9c4; border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell img { width: 32px; height: 32px; pointer-events: none; }
        .selected { border: 3px solid var(--accent); background: #b9f6ca; z-index: 2; }

        #boosters { display: flex; gap: 8px; }
        .b-btn { background: var(--white); padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; position: relative; }
        .b-count { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 8px; padding: 2px 5px; border-radius: 10px; }

        #ad-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .ad-box { background: var(--white); padding: 25px; border-radius: 24px; color: #333; width: 85%; text-align: center; }
        .btn-ad { background: var(--accent); color: white; padding: 14px 24px; border-radius: 12px; border: none; font-weight: 800; margin-top: 20px; width: 100%; font-size: 14px; }

        #admin-footer { width: 100%; background: #202124; color: #fff; padding: 6px 0; font-size: 9px; text-align: center; position: fixed; bottom: 0; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="mock-ad">BANNER EXEMPLO (TOPO)</div>

    <div id="stats-row">
        <div class="stat-card"><span class="l">Vidas</span><span class="v" id="life-ui" style="color:var(--red)">❤️ 1</span></div>
        <div class="stat-card"><span class="l">Saldo</span><span class="v" id="bal-ui">€ 0.0000</span></div>
        <div class="stat-card"><span class="l">Ações</span><span class="v" style="color:var(--red)" id="act-ui">1</span></div>
    </div>

    <div id="goals-bar">
        <div class="goal-item"><img src="https://cdn-icons-png.flaticon.com/128/1998/1998606.png"> <span id="g0">10</span></div>
        <div class="goal-item"><img src="https://cdn-icons-png.flaticon.com/128/1998/1998592.png"> <span id="g1">12</span></div>
        <div class="goal-item"><img src="https://cdn-icons-png.flaticon.com/128/10432/10432551.png"> <span id="g2">5</span></div>
    </div>

    <div id="grid"></div>

    <div id="boosters">
        <div class="b-btn">💣 BOMBA <span class="b-count">2</span></div>
        <div class="b-btn">🚜 TRATOR <span class="b-count">2</span></div>
        <div class="b-btn">⛏️ PÁ <span class="b-count">3</span></div>
    </div>

    <div class="mock-ad">BANNER EXEMPLO (FUNDO)</div>
    <div id="admin-footer">ADMIN: 5401881400 | v33.66 | 1 LIFE & 1 ACTION TEST</div>
</div>

<div id="ad-modal">
    <div class="ad-box">
        <h2 style="margin-top:0">Fim de Jogo!</h2>
        <p>Estás sem vidas e sem ações. Queres continuar a ganhar saldo?</p>
        <button class="btn-ad" onclick="watchAd()">📺 VER ANÚNCIO (+1 VIDA & +5 AÇÕES)</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // ÍCONES RESTRITOS PARA SINCRONIA TOTAL [cite: 2026-03-30]
    const farmIcons = [
        'https://cdn-icons-png.flaticon.com/128/1998/1998606.png', // Gato
        'https://cdn-icons-png.flaticon.com/128/1998/1998592.png', // Vaca
        'https://cdn-icons-png.flaticon.com/128/10432/10432551.png' // Nota Musical
    ];

    let actions = 1; // 1 Ação [cite: 2026-03-30]
    let lives = 1;   // 1 Vida [cite: 2026-03-30]
    let balance = 0.0000;
    let selected = null;
    let cells = [];
    let goals = [10, 12, 5];

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        cells = [];
        for (let i = 0; i < 49; i++) {
            let type = Math.floor(Math.random() * farmIcons.length);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            cell.dataset.type = type;
            cell.innerHTML = `<img src="${farmIcons[type]}">`;
            cell.onclick = () => handleMove(cell);
            grid.appendChild(cell);
            cells.push(cell);
        }
    }

    function handleMove(cell) {
        if (actions <= 0 || lives <= 0) return;
        if (!selected) {
            selected = cell;
            cell.classList.add('selected');
        } else {
            const idx1 = parseInt(selected.dataset.idx);
            const idx2 = parseInt(cell.dataset.idx);
            if ([1, -1, 7, -7].includes(idx1 - idx2)) {
                swap(selected, cell);
                if (!checkMatches()) {
                    setTimeout(() => swap(selected, cell), 250);
                } else {
                    actions--;
                    updateUI();
                    if (actions <= 0) {
                        lives = 0; // Perde a última vida ao acabar as ações [cite: 2026-03-30]
                        updateUI();
                        setTimeout(showAdModal, 600);
                    }
                }
            }
            selected.classList.remove('selected');
            selected = null;
        }
    }

    function swap(c1, c2) {
        const t = c1.dataset.type; const h = c1.innerHTML;
        c1.dataset.type = c2.dataset.type; c1.innerHTML = c2.innerHTML;
        c2.dataset.type = t; c2.innerHTML = h;
    }

    function checkMatches() {
        let matched = new Set();
        for (let i = 0; i < 49; i++) {
            let row = Math.floor(i/7), col = i%7;
            if (col < 5 && cells[i].dataset.type == cells[i+1].dataset.type && cells[i].dataset.type == cells[i+2].dataset.type) {
                matched.add(i); matched.add(i+1); matched.add(i+2);
            }
            if (row < 5 && cells[i].dataset.type == cells[i+7].dataset.type && cells[i].dataset.type == cells[i+14].dataset.type) {
                matched.add(i); matched.add(i+7); matched.add(i+14);
            }
        }
        if (matched.size > 0) {
            matched.forEach(idx => {
                const type = cells[idx].dataset.type;
                if (goals[type] > 0) goals[type]--;
                balance += 0.0005;
                const newType = Math.floor(Math.random() * farmIcons.length);
                cells[idx].dataset.type = newType;
                cells[idx].innerHTML = `<img src="${farmIcons[newType]}">`;
            });
            return true;
        }
        return false;
    }

    function updateUI() {
        document.getElementById('act-ui').innerText = actions;
        document.getElementById('bal-ui').innerText = `€ ${balance.toFixed(4)}`;
        document.getElementById('life-ui').innerText = `❤️ ${lives}`;
        document.getElementById('g0').innerText = goals[0];
        document.getElementById('g1').innerText = goals[1];
        document.getElementById('g2').innerText = goals[2];
    }

    function showAdModal() {
        document.getElementById('ad-modal').style.display = 'flex';
    }

    function watchAd() {
        document.getElementById('ad-modal').style.display = 'none';
        lives = 1;
        actions = 5;
        updateUI();
        tg.showPopup({ title: 'Recompensa!', message: 'Viste o anúncio. Recebeste +1 vida e +5 ações!' });
    }

    init();
</script>
</body>
</html>
