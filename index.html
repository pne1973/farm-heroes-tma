<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouro da Quinta v36.02 - JOGO DESBLOQUEADO</title>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --blue: #4285f4; --brown: #8d6e63; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            touch-action: none; /* Bloqueia scroll em toda a página para teste */
        }

        /* HEADER */
        #header { background: #fff; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #ddd; z-index: 100; }
        .stat { text-align: center; }
        .stat small { font-size: 9px; color: #888; display: block; }
        .stat b { font-size: 14px; color: var(--accent); }

        /* JOGO - Z-INDEX MÁXIMO */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; position: relative; }
        .grid { 
            display: grid; grid-template-columns: repeat(7, 42px); gap: 5px; 
            background: var(--brown); padding: 12px; border-radius: 12px;
            pointer-events: auto !important; 
            touch-action: none; /* Garante que o toque não faz scroll aqui */
        }
        .cell { 
            width: 42px; height: 42px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            cursor: pointer; position: relative;
        }
        .cell span { pointer-events: none; } /* O emoji não recebe o clique */

        /* PAINEL ADMIN */
        #admin-panel { display: none; position: fixed; inset: 0; background: #f0f2f5; z-index: 1000; overflow-y: auto; padding: 20px; touch-action: auto; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .btn-ad { background: var(--blue); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-admin { position: fixed; top: 10px; right: 10px; z-index: 500; background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 50px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<button class="btn-admin" onclick="toggleAdmin()">AUDITORIA ⚙️</button>

<div id="header">
    <div class="stat"><small>ID</small><b id="ui-id">5401881400</b></div>
    <div class="stat"><small>SALDO</small><b id="ui-bal">€ 0.0000</b></div>
    <div class="stat"><small>AÇÕES</small><b id="ui-act">20</b></div>
</div>

<div id="game-view">
    <div class="grid" id="main-grid">
        </div>
    <button class="btn-ad" onclick="simulateAd()">VER ANÚNCIO (+10 AÇÕES)</button>
</div>

<div id="admin-panel">
    <h3>COMANDO CENTRAL: v36.02</h3>
    
    <div class="card">
        <h4>Trocar Utilizador de Teste</h4>
        <input type="number" id="test-id" placeholder="ID Utilizador..." style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="switchUser()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:5px;">SIMULAR ID</button>
    </div>

    <div class="card">
        <h4>Detalhamento Global de Receita</h4>
        <p>Ganhos Admin (Ads): <b id="adm-rev">€ 0.0000</b></p>
        <p>Saldos Totais Users: <b id="adm-pass">€ 0.0000</b></p>
    </div>

    <div class="card">
        <h4>Utilizadores em Tempo Real</h4>
        <table style="width:100%; font-size:12px; border-collapse:collapse;">
            <thead><tr style="text-align:left; border-bottom:1px solid #eee;"><th>ID</th><th>Saldo</th><th>Ações</th></tr></thead>
            <tbody id="admin-rows"></tbody>
        </table>
    </div>

    <button onclick="toggleAdmin()" style="width:100%; padding:15px; background:#333; color:white; border-radius:10px; border:none; margin-top:20px;">VOLTAR AO JOGO</button>
</div>

<script>
    const items = ['🥛', '🥚', '🍯', '🚜'];
    let currentId = "5401881400";
    let globalRev = 0;
    let db = { "5401881400": { bal: 0, act: 20 } };

    function initGrid() {
        const g = document.getElementById('main-grid');
        g.innerHTML = '';
        for(let i=0; i<49; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.innerHTML = `<span>${items[Math.floor(Math.random()*4)]}</span>`;
            // Listener de toque e rato para máxima compatibilidade
            c.addEventListener('click', handlePlay);
            g.appendChild(c);
        }
        update();
    }

    function handlePlay() {
        let u = db[currentId];
        if(u.act > 0) {
            u.act--;
            u.bal += 0.0005;
            update();
        } else {
            alert("Sem ações! Veja um anúncio.");
        }
    }

    function simulateAd() {
        globalRev += 0.0010;
        db[currentId].act += 10;
        update();
        alert("Receita de Admin registada: +€0.0010");
    }

    function switchUser() {
        const sid = document.getElementById('test-id').value;
        if(!sid) return;
        if(!db[sid]) db[sid] = { bal: 0, act: 20 };
        currentId = sid;
        update();
        toggleAdmin();
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function update() {
        const u = db[currentId];
        document.getElementById('ui-id').innerText = currentId;
        document.getElementById('ui-bal').innerText = `€ ${u.bal.toFixed(4)}`;
        document.getElementById('ui-act').innerText = u.act;
        
        // Admin Update
        document.getElementById('adm-rev').innerText = `€ ${globalRev.toFixed(4)}`;
        
        let passivo = 0;
        let rows = "";
        for(let id in db) {
            passivo += db[id].bal;
            rows += `<tr><td>#${id}</td><td>€ ${db[id].bal.toFixed(4)}</td><td>${db[id].act}</td></tr>`;
        }
        document.getElementById('adm-pass').innerText = `€ ${passivo.toFixed(4)}`;
        document.getElementById('admin-rows').innerHTML = rows;
    }

    window.onload = initGrid;
</script>
</body>
</html>
