<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.40 - Fixed Layout</title>

    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }

        /* Estrutura Principal: Sem Scroll */
        #viewport {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; position: relative; padding: 5px 0;
        }

        /* Dashboards superiores: Compactos para sobrar espaço em baixo */
        #ui-header { width: 92%; margin-bottom: 5px; flex-shrink: 0; }
        .card { background: var(--white); border-radius: 12px; display: flex; justify-content: space-around; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .val { font-size: 15px; font-weight: 800; color: var(--accent); }
        .label { font-size: 9px; text-transform: uppercase; color: #5f6368; font-weight: 700; }

        #missions { background: var(--white); padding: 4px 15px; border-radius: 20px; margin: 5px 0; font-size: 11px; font-weight: 800; flex-shrink: 0; }

        /* Tabuleiro: Tamanho fixo para garantir que aparece sempre */
        #game-grid { 
            display: grid; grid-template-columns: repeat(7, 36px); grid-template-rows: repeat(7, 36px); 
            gap: 4px; padding: 8px; background: #8d6e63; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); flex-shrink: 0;
        }
        .cell { width: 36px; height: 36px; background: #fff9c4; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
        .cell img { width: 26px; height: 26px; }

        /* ÁREA DE ANÚNCIO: Ocupa o "vazio" da tua imagem de forma inteligente */
        #ad-area { 
            flex-grow: 1; width: 100%; min-height: 50px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; padding: 5px 0;
        }

        /* Botões: Fixos no fundo para não serem empurrados */
        #ui-footer { width: 100%; padding-bottom: 55px; flex-shrink: 0; }
        .btn-row { display: flex; justify-content: center; gap: 8px; }
        .btn { 
            background: var(--white); padding: 5px; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            min-width: 85px; border: 1px solid #ddd; position: relative;
        }
        .count { position: absolute; top: -4px; right: -4px; background: var(--red); color: white; font-size: 9px; padding: 2px 5px; border-radius: 8px; }

        #admin-strip { position: fixed; bottom: 0; width: 100%; background: #202124; color: white; padding: 8px 0; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="ui-header">
        <div class="card">
            <div style="text-align:center"><div class="label">Nível</div><div class="val">1</div></div>
            <div style="text-align:center"><div class="label">Saldo</div><div class="val">€ 0.0000</div></div>
            <div style="text-align:center"><div class="label">Ações</div><div class="val" style="color:var(--red)">21</div></div>
        </div>
    </div>

    <div id="missions">🧀 10 | 🍯 5 | 🥚 12</div>

    <div id="game-grid" id="grid"></div>

    <div id="ad-area">
        <div style="font-size: 8px; color: #999; margin-bottom: 2px;">PRODUÇÃO PATROCINADA</div>
        <div id="container-5a080aa61604cd40501f4a250aa83ca6"></div>
        <script async="async" data-cfasync="false" src="https://pl29012865.profitablecpmratenetwork.com/5a080aa61604cd40501f4a250aa83ca6/invoke.js"></script>
    </div>

    <div id="ui-footer">
        <div class="btn-row">
            <div class="btn"><img src="https://cdn-icons-png.flaticon.com/128/598/598219.png" width="20"><b>BOMBA</b><div class="count">2</div></div>
            <div class="btn"><img src="https://cdn-icons-png.flaticon.com/128/940/940561.png" width="20"><b>TRATOR</b><div class="count">2</div></div>
            <div class="btn"><img src="https://cdn-icons-png.flaticon.com/128/2210/2210041.png" width="20"><b>PÁ</b><div class="count">3</div></div>
        </div>
    </div>

    <div id="admin-strip">ADMIN: 5401881400 | TOTAL APP: € 0.0000</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const icons = ['https://cdn-icons-png.flaticon.com/128/802/802271.png', 'https://cdn-icons-png.flaticon.com/128/3050/3050181.png', 'https://cdn-icons-png.flaticon.com/128/837/837560.png', 'https://cdn-icons-png.flaticon.com/128/2909/2909774.png', 'https://cdn-icons-png.flaticon.com/128/3104/3104618.png'];

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('game-grid');
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<img src="${icons[Math.floor(Math.random()*icons.length)]}">`;
            grid.appendChild(cell);
        }
    }
    init();
</script>
</body>
</html>
