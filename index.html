<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.18 - FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --wood: #5d4037; --accent: #2e7d32; --google-blue: #4285F4; --red: #d93025; --white: #ffffff; --gray: #f1f3f4; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #header-wallet { width: 94%; background: white; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .val { font-size: 18px; font-weight: bold; color: var(--accent); }
        .label { font-size: 10px; text-transform: uppercase; color: #666; }
        #grid { display: grid; grid-template-columns: repeat(7, 42px); grid-template-rows: repeat(7, 42px); gap: 4px; padding: 10px; background: #ccc; border-radius: 10px; }
        .cell { width: 42px; height: 42px; background: #eee; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; user-select: none; }
        .cell.selected { outline: 3px solid var(--google-blue); background: #fff; }
        #booster-container { display: flex; gap: 15px; margin-top: 20px; margin-bottom: 80px; }
        .booster-btn { background: white; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; min-width: 60px; border: 1px solid #ddd; position: relative; }
        .booster-btn.active { border: 2px solid var(--google-blue); background: #eef; }
        .b-count { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        #admin-panel { position: fixed; bottom: 55px; width: 100%; background: #222; color: white; padding: 5px; font-size: 12px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="header-wallet">
        <div style="text-align:center"><div class="label">Nível</div><div id="lvl" class="val">1</div></div>
        <div style="text-align:center"><div class="label">Saldo</div><div id="bal" class="val">€ 0.0000</div></div>
        <div style="text-align:center"><div class="label">Ações</div><div id="mov" class="val" style="color:var(--red)">21</div></div>
    </div>

    <div id="grid"></div>

    <div id="booster-container">
        <div class="booster-btn" onclick="setB('bomb')" id="btn-bomb">💣<span>BOMBA</span><div class="b-count">2</div></div>
        <div class="booster-btn" onclick="setB('swap')" id="btn-swap">🔄<span>TROCA</span><div class="b-count">2</div></div>
        <div class="booster-btn" onclick="setB('shovel')" id="btn-shovel">🧹<span>PÁ</span><div class="b-count">3</div></div>
    </div>

    <div id="admin-panel">ADMIN: <span id="adm-id"></span> | TOTAL: € <span id="adm-t">0.0000</span></div>

<script>
    const tg = window.Telegram.WebApp;
    const items = ['🧀', '🍯', '🥚', '🍞', '🥛'];
    let moves = 21, balance = 0, level = 1, squares = [], activeB = null, swapId = null;
    let bCounts = { bomb: 2, swap: 2, shovel: 3 };

    function init() {
        const container = document.getElementById('grid');
        container.innerHTML = ''; squares = [];
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = items[Math.floor(Math.random() * items.length)];
            cell.onclick = () => clickCell(i);
            container.appendChild(cell);
            squares.push(cell);
        }
        if(tg.initDataUnsafe.user?.id == 5401881400) document.getElementById('admin-panel').style.display = 'block';
        updateUI();
    }

    function clickCell(id) {
        if (activeB) {
            useBooster(id);
            return;
        }
        const match = getMatch(id);
        if (match.length >= 3) {
            match.forEach(i => squares[i].innerHTML = '');
            balance += 0.0002; moves--;
            setTimeout(gravity, 200);
        }
        updateUI();
    }

    function getMatch(id) {
        let icon = squares[id].innerHTML;
        if (!icon) return [];
        let connected = [id], stack = [id];
        while(stack.length > 0) {
            let curr = stack.pop();
            [curr-1, curr+1, curr-7, curr+7].forEach(n => {
                if (n >= 0 && n < 49 && !connected.includes(n) && squares[n].innerHTML === icon) {
                    if (Math.abs(curr - n) === 7 || (Math.floor(curr/7) === Math.floor(n/7))) {
                        connected.push(n); stack.push(n);
                    }
                }
            });
        }
        return connected;
    }

    function gravity() {
        for (let i = 41; i >= 0; i--) {
            if (squares[i+7].innerHTML === '') {
                squares[i+7].innerHTML = squares[i].innerHTML;
                squares[i].innerHTML = '';
            }
        }
        squares.forEach(s => { if(s.innerHTML === '') s.innerHTML = items[Math.floor(Math.random()*items.length)]; });
        updateUI();
    }

    function setB(type) {
        if (bCounts[type] <= 0) return;
        activeB = (activeB === type) ? null : type;
        swapId = null;
        document.querySelectorAll('.booster-btn').forEach(b => b.classList.remove('active'));
        squares.forEach(s => s.classList.remove('selected'));
        if (activeB) document.getElementById('btn-' + type).classList.add('active');
    }

    function useBooster(id) {
        if (activeB === 'bomb') {
            [id, id-1, id+1, id-7, id+7, id-8, id+8, id-6, id+6].forEach(i => { if(i>=0 && i<49) squares[i].innerHTML = ''; });
        } else if (activeB === 'shovel') {
            squares[id].innerHTML = '';
        } else if (activeB === 'swap') {
            if (swapId === null) { swapId = id; squares[id].classList.add('selected'); return; }
            let t = squares[swapId].innerHTML; squares[swapId].innerHTML = squares[id].innerHTML; squares[id].innerHTML = t;
        }
        bCounts[activeB]--; activeB = null;
        setB(null); setTimeout(gravity, 200);
    }

    function updateUI() {
        document.getElementById('bal').innerText = '€ ' + balance.toFixed(4);
        document.getElementById('mov').innerText = moves;
        document.getElementById('lvl').innerText = level;
    }

    init();
</script>
</body>
</html>
