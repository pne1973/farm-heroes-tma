<script>

    const farmIcons = [

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let board = [];
        for (let i = 0; i < 49; i++) {
            let idx;
            do {
                idx = Math.floor(Math.random() * farmIcons.length);
            } while (
                (i % 7 >= 2 && board[i-1] === idx && board[i-2] === idx) ||
                (i >= 14 && board[i-7] === idx && board[i-14] === idx)
            );
            board[i] = idx;
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<img src="${farmIcons[idx]}">`;
            grid.appendChild(cell);
        }
    }
    init();
