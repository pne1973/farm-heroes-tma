<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.50 - DRAG & DROP OK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-between; position: relative; }

        /* MOCK ADS: CONTENTORES DE EXEMPLO */
        .mock-ad { 
            width: 320px; height: 50px; background: #e0e0e0; border: 2px dashed #999; 
            color: #666; font-size: 10px; font-weight: bold; display: flex; 
            align-items: center; justify-content: center; text-transform: uppercase; 
            flex-shrink: 0; 
        }
        #top-ad { margin-top: 10px; z-index: 50; }
        #bottom-ad { margin-bottom: 40px; z-index: 50; }

        /* Dashboard & stats */
        #header-stats { width: 95%; background: var(--white); border-radius: 12px; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .v { font-size: 15px; font-weight: 800; color: var(--accent); }
        .l { font-size: 8px; text-transform: uppercase; color: #666; font-weight: 700; }
        #resource-pill { background: var(--white); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; margin: 5px 0; }

        /* ÁREA DE JOGO CENTRALIZADA */
        #game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(7, 40px); grid-template-rows: repeat(7, 40px); 
            gap: 4px; padding: 10px; background: #8d6e63; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative;
        }
        .cell { 
            width: 40px; height: 40px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .cell img { width: 30px; height: 30px; pointer-events: none; }
        
        /* Estilo para arrasto no desktop */
        .over { background: rgba(46, 125, 50, 0.3); border: 1px solid var(--accent); }

        /* Boosters */
        #boosters { display: flex; gap: 10px; margin-top: 10px; }
        .b-btn { background: var(--white); padding: 8px 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .b-btn img { width: 18px; height: 18px; }

        #admin { position: fixed; bottom: 0; width: 100%; background: #202124; color: #fff; padding: 8px 0; font-size: 10px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app-shell">
    <div id="top-ad" class="mock-ad">Exemplo: Banner 320x50</div>

    <div id="header-stats">
        <div style="text-align:center"><div class="l">Nível</div><div class="v">1</div></div>
        <div style="text-align:center"><div class="l">Saldo</div><div class="v">€ 0.0000</div></div>
        <div style="text-align:center"><div class="l">Ações</div><div class="v" style="color:var(--red)">21</div></div>
    </div>
    <div id="resource-pill">🥛 0 | 🥚 0 | 🧶 0 | 🍯 0</div>

    <div id="game-zone">
        <div id="grid"></div>
        <div id="boosters">
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/598/598219.png">BOMBA</div>
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/940/940561.png">TROCA</div>
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/2210/2210041.png">PÁ</div>
        </div>
    </div>

    <div id="bottom-ad" class="mock-ad">Exemplo: Banner 320x50</div>

    <div id="admin">ADMIN: 5401881400 | v33.50 PRODUCTION | 50MB LIMIT</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const icons = ['https://cdn-icons-png.flaticon.com/128/3050/3050181.png', 'https://cdn-icons-png.flaticon.com/128/802/802271.png', 'https://cdn-icons-png.flaticon.com/128/837/837560.png', 'https://cdn-icons-png.flaticon.com/128/2909/2909774.png', 'https://cdn-icons-png.flaticon.com/128/3104/3104618.png'];
    
    let dragSrcEl = null;

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            cell.innerHTML = `<img src="${icons[Math.floor(Math.random()*icons.length)]}">`;
            
            // Ativar Drag and Drop Nativo
            cell.draggable = true;
            cell.addEventListener('dragstart', handleDragStart);
            cell.addEventListener('dragover', handleDragOver);
            cell.addEventListener('drop', handleDrop);
            cell.addEventListener('dragend', handleDragEnd);
            
            grid.appendChild(cell);
        }
    }

    // MECÂNICA DRAG AND DROP NATIVA
    function handleDragStart(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        this.style.opacity = '0.4';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        this.classList.add('over'); // Feedback visual
        return false;
    }

    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        this.classList.remove('over');

        if (dragSrcEl !== this) {
            // Deteção de vizinhos (cima, baixo, esquerda, direita)
            const idx1 = parseInt(dragSrcEl.dataset.idx);
            const idx2 = parseInt(this.dataset.idx);
            const isNeighbor = [1, -1, 7, -7].includes(idx1 - idx2);

            if (isNeighbor) {
                // Realiza a troca visual
                const tempHTML = dragSrcEl.innerHTML;
                dragSrcEl.innerHTML = this.innerHTML;
                this.innerHTML = tempHTML;
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.impactOccurred('rigid'); // Feedback de erro
            }
        }
        return false;
    }

    function handleDragEnd() {
        this.style.opacity = '1';
        // Limpar classes de feedback visual em todas as células
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('over'));
    }

    init();
</script>
</body>
</html>
