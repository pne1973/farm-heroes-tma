<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ouro da Quinta v33.96 - FLASH TEST</title>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --white: #ffffff; --brown: #8d6e63; --blue: #4285f4; --red: #d93025; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { margin: 0; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #top-ad { background: #fff; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; border-bottom: 1px solid #ddd; }
        #admin-trigger { position: fixed; top: 60px; right: 12px; z-index: 5000; background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        #header { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .stats-row { width: 100%; display: flex; justify-content: space-around; gap: 8px; padding: 0 10px; }
        .stat-card { background: var(--white); padding: 10px; border-radius: 15px; text-align: center; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-v { font-size: 15px; font-weight: 800; color: var(--accent); }
        .stat-l { font-size: 9px; color: #999; text-transform: uppercase; display: block; }

        #grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #grid { display: grid; grid-template-columns: repeat(7, 44px); gap: 4px; padding: 10px; background: var(--brown); border-radius: 18px; }
        .cell { width: 44px; height: 44px; background: #fff9c4; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .selected { outline: 3px solid var(--blue); transform: scale(1.1); z-index: 5; background: #fffde7; }

        .powers { display: flex; justify-content: center; gap: 10px; padding: 15px; }
        .p-btn { background: white; padding: 8px 12px; border-radius: 15px; border: none; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .p-count { background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* Modal Anúncios 300x250 */
        #ad-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; overflow-y: auto; padding: 20px; }
        .ad-box { width: 300px; height: 250px; background: white; margin: 10px; border: 4px solid #fbbc05; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; }
        .ad-close-btn { margin-top: 20px; padding: 15px 30px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; display: none; }

        #admin-panel { display: none; position: fixed; inset: 0; background: #f4f4f4; z-index: 9999; padding: 25px; }
        #footer { background: #000; color: #fff; padding: 10px; text-align: center; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-ad">BANNER TESTE v33.96</div>
<button id="admin-trigger" onclick="toggleAdmin()">ADMIN ⚙️</button>

<div id="header">
    <div class="stats-row">
        <div class="stat-card"><span class="stat-l">Nível</span><span class="stat-v">TESTE FLASH</span></div>
        <div class="stat-card"><span class="stat-l">Vidas</span><span class="stat-v" id="life-ui">❤️</span></div>
        <div class="stat-card"><span class="stat-l">Ações</span><span class="stat-v" id="act-ui">1</span></div>
    </div>
    <div style="background:white; padding:5px 25px; border-radius:20px; margin-top:5px; font-weight:bold; border:1px solid #ddd;">
        🥛<span id="m1">5</span> 🥚<span id="m2">5</span> 🍯<span id="m3">5</span>
    </div>
</div>

<div id="grid-container"><div id="grid"></div></div>

<div class="powers">
    <button class="p-btn" onclick="useBooster('bomb')">💣 <span class="p-count" id="b-bomb">1</span></button>
    <button class="p-btn" onclick="useBooster('tractor')">🚜 <span class="p-count" id="b-tractor">1</span></button>
    <button class="p-btn" onclick="useBooster('shovel')">⛏️ <span class="p-count" id="b-shovel">1</span></button>
</div>

<div id="ad-modal">
    <div id="ad-info" style="color:white; margin-bottom:15px; font-weight:bold; text-align:center;"></div>
    <div id="ad-container"></div>
    <button id="ad-close-btn" class="ad-close-btn" onclick="rewardUser()">FECHAR E RECEBER BÓNUS</button>
</div>

<div id="admin-panel">
    <h2>ADMIN: 5401881400</h2>
    <div style="background:white; padding:15px; border-radius:10px;">
        <p>Receita Banners: <span style="color:green" id="adm-rev">€ 0.0020</span></p>
        <p>Custo DB: <span id="adm-cost" style="color:red">€ 0.0000</span></p>
    </div>
    <button onclick="toggleAdmin()" style="width:100%; padding:15px; margin-top:20px; border-radius:10px; border:none; background:#555; color:white; font-weight:bold;">VOLTAR AO TESTE</button>
</div>

<div id="footer">OURO DA QUINTA v33.96 | 1 ACTION TEST MODE</div>

<script>
    const icons = ['🥛', '🥚', '🍯', '🚜'];
    let level=1, balance=0, actions=1, lives=1, selectedIdx=null, matchesCount=0;
    let boosters = { bomb: 1, tractor: 1, shovel: 1 };
    let mission = { '🥛': 5, '🥚': 5, '🍯': 5 };
    let gridArray = [], rev = 0.0020;
    let pendingReward = null;

    function initGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = ''; gridArray = [];
        for (let i = 0; i < 49; i++) {
            gridArray.push(icons[Math.floor(Math.random() * icons.length)]);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => handleCell(i);
            gridEl.appendChild(cell);
        }
        resolve(true);
    }

    function handleCell(i) {
        if (lives <= 0) { showAdFlow('life', 1, "RECOMPENSA: +1 VIDA"); return; }
        if (actions <= 0) { showAdOptions(); return; }
        
        if (selectedIdx === null) {
            selectedIdx = i; document.querySelectorAll('.cell')[i].classList.add('selected');
        } else {
            if (isAdj(selectedIdx, i)) executeSwap(selectedIdx, i);
            document.querySelectorAll('.cell')[selectedIdx].classList.remove('selected');
            selectedIdx = null;
        }
    }

    function isAdj(i1, i2) { return Math.abs(Math.floor(i1/7)-Math.floor(i2/7)) + Math.abs((i1%7)-(i2%7)) === 1; }

    async function executeSwap(i1, i2) {
        let t = gridArray[i1]; gridArray[i1] = gridArray[i2]; gridArray[i2] = t;
        if (findMatches().length > 0) {
            actions--; matchesCount++;
            await resolve(); 
        } else {
            t = gridArray[i1]; gridArray[i1] = gridArray[i2]; gridArray[i2] = t;
            render();
        }
        updateUI();
        if (actions <= 0 && !missionComplete()) setTimeout(showAdOptions, 500);
    }

    function missionComplete() { return mission['🥛']<=0 && mission['🥚']<=0 && mission['🍯']<=0; }

    async function resolve(init) {
        let m = findMatches(); if (m.length === 0) return;
        m.forEach(i => { if (!init && mission[gridArray[i]] > 0) mission[gridArray[i]]--; gridArray[i] = null; });
        render(); await new Promise(r => setTimeout(r, 200));
        applyGravity(); await resolve(init);
    }

    function applyGravity() {
        for(let c=0;c<7;c++) {
            let e=0; for(let r=6;r>=0;r--) {
                let i=r*7+c; if(!gridArray[i]) e++; else if(e>0) { gridArray[i+e*7]=gridArray[i]; gridArray[i]=null; }
            }
            for(let i=0;i<e;i++) gridArray[i*7+c]=icons[Math.floor(Math.random()*4)];
        }
        render();
    }

    function findMatches() {
        let s = new Set();
        for(let r=0;r<7;r++) for(let c=0;c<5;c++) {
            let i=r*7+c; if(gridArray[i]===gridArray[i+1] && gridArray[i]===gridArray[i+2]) { s.add(i); s.add(i+1); s.add(i+2); }
        }
        for(let c=0;c<7;c++) for(let r=0;r<5;r++) {
            let i=r*7+c; if(gridArray[i]===gridArray[i+7] && gridArray[i]===gridArray[i+14]) { s.add(i); s.add(i+7); s.add(i+14); }
        }
        return Array.from(s);
    }

    function useBooster(type) {
        if (boosters[type] > 0) { boosters[type]--; updateUI(); alert("USADO!"); }
        else { showAdFlow('boosters', 2, "RECOMPENSA: +3 BOOSTERS"); }
    }

    function showAdOptions() {
        let opt = prompt("Escolha bónus para continuar:\n1 - +5 Ações (2 Ads)\n2 - +10 Ações (3 Ads)\n3 - +15 Ações (4 Ads)\n4 - Perder Vida");
        if (opt == "1") showAdFlow('act5', 2, "RECOMPENSA: +5 AÇÕES");
        else if (opt == "2") showAdFlow('act10', 3, "RECOMPENSA: +10 AÇÕES");
        else if (opt == "3") showAdFlow('act15', 4, "RECOMPENSA: +15 AÇÕES");
        else { lives--; actions=1; updateUI(); if(lives<=0) showAdFlow('life', 1, "RECOMPENSA: +1 VIDA"); }
    }

    function showAdFlow(type, count, text) {
        pendingReward = type;
        const modal = document.getElementById('ad-modal');
        const container = document.getElementById('ad-container');
        const closeBtn = document.getElementById('ad-close-btn');
        document.getElementById('ad-info').innerText = text;
        container.innerHTML = "";
        modal.style.display = 'flex';
        closeBtn.style.display = 'none';

        for (let i = 0; i < count; i++) {
            const ad = document.createElement('div');
            ad.className = 'ad-box';
            ad.innerHTML = `AD GOOGLE $300x250<br>Slot #${i+1}`;
            container.appendChild(ad);
            rev += 0.0005;
        }
        setTimeout(() => { closeBtn.style.display = 'block'; }, 2000 * count);
    }

    function rewardUser() {
        if (pendingReward === 'life') { lives = 1; actions = 1; }
        if (pendingReward === 'act5') actions = 5;
        if (pendingReward === 'act10') actions = 10;
        if (pendingReward === 'act15') actions = 15;
        if (pendingReward === 'boosters') { boosters.bomb+=1; boosters.tractor+=1; boosters.shovel+=1; }
        document.getElementById('ad-modal').style.display = 'none';
        updateUI();
        pendingReward = null;
    }

    function updateUI() {
        document.getElementById('act-ui').innerText = actions;
        document.getElementById('life-ui').innerText = lives > 0 ? "❤️" : "💔";
        document.getElementById('m1').innerText = mission['🥛'];
        document.getElementById('m2').innerText = mission['🥚'];
        document.getElementById('m3').innerText = mission['🍯'];
        document.getElementById('b-bomb').innerText = boosters.bomb;
        document.getElementById('b-tractor').innerText = boosters.tractor;
        document.getElementById('b-shovel').innerText = boosters.shovel;
        document.getElementById('adm-rev').innerText = `€ ${rev.toFixed(4)}`;
        document.getElementById('adm-cost').innerText = `€ ${(matchesCount * 0.0005).toFixed(4)}`;
    }

    function render() {
        const cells = document.querySelectorAll('.cell');
        gridArray.forEach((icon, i) => cells[i].innerText = icon || "");
    }

    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; updateUI(); }

    initGrid();
    updateUI();
</script>
</body>
</html>
