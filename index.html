<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.20 - HD SVG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --google-blue: #4285F4; --red: #d93025; --white: #ffffff; --gray: #bdc1c6; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Dashboard */
        #header-wallet { width: 94%; background: white; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        .val { font-size: 18px; font-weight: bold; color: var(--accent); }
        .label { font-size: 10px; text-transform: uppercase; color: #666; }
        #mission-bar { display: flex; gap: 12px; margin-bottom: 5px; background: white; padding: 5px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #dadce0; }
        .m-icon { width: 18px; height: 18px; vertical-align: middle; }

        /* GRID HD - USANDO IMAGENS SVG */
        #grid { 
            display: grid; grid-template-columns: repeat(7, 42px); grid-template-rows: repeat(7, 42px); 
            gap: 4px; padding: 10px; background: #9da3a8; border-radius: 10px;
            touch-action: none; user-select: none;
        }
        .cell { 
            width: 42px; height: 42px; background: #f8f9fa; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }
        
        /* Ícones HD Cristais */
        .icon { width: 32px; height: 32px; pointer-events: none; }

        /* ANIMAÇÃO DE EXPLOSÃO */
        .explode { transform: scale(0); opacity: 0; }

        /* Resto do Layout */
        #booster-container { display: flex; gap: 15px; margin-top: 20px; margin-bottom: 80px; }
        .booster-btn { background: white; padding: 8px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; min-width: 65px; border: 1px solid #ddd; position: relative; }
        .b-icon { width: 24px; height: 24px; margin-bottom: 3px; }
        #admin-panel { position: fixed; bottom: 55px; width: 100%; background: #222; color: white; padding: 8px; font-size: 12px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="header-wallet">
        <div style="text-align:center"><div class="label">Nível</div><div id="lvl" class="val">1</div></div>
        <div style="text-align:center"><div class="label">Saldo</div><div id="bal" class="val">€ 0.0000</div></div>
        <div style="text-align:center"><div class="label">Ações</div><div id="mov" class="val" style="color:var(--red)">21</div></div>
    </div>

    <div id="mission-bar">
        <div><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f9c0.svg" class="m-icon"> <span id="m0">10</span></div>
        <div><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f36f.svg" class="m-icon"> <span id="m1">5</span></div>
        <div><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f95a.svg" class="m-icon"> <span id="m2">12</span></div>
    </div>

    <div id="grid"></div>

    <div id="booster-container">
        <div class="booster-btn"><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f4a3.svg" class="b-icon"><span>BOMBA</span></div>
        <div class="booster-btn"><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f504.svg" class="b-icon"><span>TROCA</span></div>
        <div class="booster-btn"><img src="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f9f9.svg" class="b-icon"><span>PÁ</span></div>
    </div>

    <div id="admin-panel">ADMIN: 5401881400 | TOTAL APP: € <span id="adm-t">0.0000</span></div>

<script>
    const tg = window.Telegram.WebApp;
    // URLs dos Ícones SVG Cristais (usando repositório oficial Google Noto Emoji)
    const itemSvgs = [
        'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f9c0.svg', // 🧀
        'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f36f.svg', // 🍯
        'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f95a.svg', // 🥚
        'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f35e.svg', // 🍞
        'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f95b.svg'  // 🥛
    ];
    
    let moves = 21, balance = 0, level = 1, squares = [], mission = [10, 5, 12];
    let startId = null, isDragging = false;

    function init() {
        const container = document.getElementById('grid');
        container.innerHTML = ''; squares = [];
        
        const temp = [];
        for (let i = 0; i < 49; i++) {
            let svgIdx;
            do {
                svgIdx = Math.floor(Math.random() * itemSvgs.length);
            } while (
                (i % 7 >= 2 && temp[i-1] === svgIdx && temp[i-2] === svgIdx) ||
                (i >= 14 && temp[i-7] === svgIdx && temp[i-14] === svgIdx)
            );
            temp[i] = svgIdx;
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.id = i;
            cell.dataset.svgIdx = svgIdx;
            
            // Injeta a imagem SVG HD
            const img = document.createElement('img');
            img.src = itemSvgs[svgIdx];
            img.className = 'icon';
            cell.appendChild(img);
            
            cell.addEventListener('touchstart', handleStart);
            cell.addEventListener('touchmove', handleMove);
            cell.addEventListener('touchend', handleEnd);
            
            container.appendChild(cell);
            squares.push(cell);
        }
        if(tg.initDataUnsafe.user?.id == 5401881400) document.getElementById('admin-panel').style.display = 'block';
        updateUI();
    }

    function handleStart(e) { startId = parseInt(e.currentTarget.dataset.id); isDragging = true; }
    function handleEnd() { isDragging = false; }
    function handleMove(e) {
        if (!isDragging) return;
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!target || !target.dataset.id) return;
        const endId = parseInt(target.dataset.id);
        if (endId !== startId) {
            const diff = Math.abs(startId - endId);
            if ((diff === 1 && Math.floor(startId/7) === Math.floor(endId/7)) || diff === 7) {
                isDragging = false; swap(startId, endId);
            }
        }
    }

    function swap(id1, id2) {
        const idx1 = squares[id1].dataset.svgIdx;
        const idx2 = squares[id2].dataset.svgIdx;
        
        // Troca visual e de dados
        updateCell(id1, idx2);
        updateCell(id2, idx1);

        if (!checkMatches()) {
            setTimeout(() => { updateCell(id1, idx1); updateCell(id2, idx2); }, 300);
        } else {
            moves--; updateUI();
        }
    }

    function updateCell(id, svgIdx) {
        squares[id].dataset.svgIdx = svgIdx;
        squares[id].querySelector('.icon').src = itemSvgs[svgIdx];
    }

    function checkMatches() {
        let matched = false;
        let toRemove = new Set();

        for (let i = 0; i < 49; i++) {
            if (i % 7 < 5) {
                if (squares[i].dataset.svgIdx === squares[i+1].dataset.svgIdx && squares[i].dataset.svgIdx === squares[i+2].dataset.svgIdx) {
                    [i, i+1, i+2].forEach(idx => toRemove.add(idx)); matched = true;
                }
            }
            if (i < 35) {
                if (squares[i].dataset.svgIdx === squares[i+7].dataset.svgIdx && squares[i].dataset.svgIdx === squares[i+14].dataset.svgIdx) {
                    [i, i+7, i+14].forEach(idx => toRemove.add(idx)); matched = true;
                }
            }
        }

        if (matched) {
            toRemove.forEach(idx => {
                const svgIdx = squares[idx].dataset.svgIdx;
                // Atualiza missão
                if (svgIdx == 0) mission[0] = Math.max(0, mission[0]-1);
                if (svgIdx == 1) mission[1] = Math.max(0, mission[1]-1);
                if (svgIdx == 2) mission[2] = Math.max(0, mission[2]-1);
                
                // APLICA EFEITO DE EXPLOSÃO VISUAL (Shrink + Fade)
                squares[idx].classList.add('explode');
            });
            balance += 0.0005;
            // Aguarda a animação (150ms) antes de remover e aplicar gravidade
            setTimeout(gravity, 160);
        }
        return matched;
    }

    function gravity() {
        // Remove os ícones marcados e limpa a classe explode
        squares.forEach(s => {
            if (s.classList.contains('explode')) {
                s.classList.remove('explode');
                s.dataset.svgIdx = ''; // Limpa o dado
                s.querySelector('.icon').src = ''; // Limpa a imagem
            }
        });

        for (let i = 41; i >= 0; i--) {
            if (squares[i+7].dataset.svgIdx === '') {
                updateCell(i+7, squares[i].dataset.svgIdx);
                squares[i].dataset.svgIdx = '';
                squares[i].querySelector('.icon').src = '';
            }
        }
        squares.forEach(s => {
            if (s.dataset.svgIdx === '') {
                updateCell(s.dataset.id, Math.floor(Math.random() * itemSvgs.length));
            }
        });
        if (checkMatches()) { setTimeout(gravity, 300); }
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal').innerText = '€ ' + balance.toFixed(4);
        document.getElementById('mov').innerText = moves;
        document.getElementById('lvl').innerText = level;
        document.getElementById('m0').innerText = mission[0];
        document.getElementById('m1').innerText = mission[1];
        document.getElementById('m2').innerText = mission[2];
    }

    init();
</script>
</body>
</html>
