<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ouro da Quinta v33.72 - ECONOMY LEDGER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; --brown: #8d6e63; }
        * { box-sizing: border-box; font-family: sans-serif; user-select: none; }
        body { margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }

        #app-shell { display: flex; flex-direction: column; height: 100%; align-items: center; justify-content: space-between; padding: 10px 0 45px 0; }

        /* BANNER ADS [cite: 2026-03-30] */
        .game-ad-area { width: 320px; height: 50px; background: #eee; border: 1px dashed #bbb; color: #999; font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }

        #stats-row { width: 92%; display: flex; justify-content: space-between; gap: 8px; }
        .stat-card { background: var(--white); padding: 8px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .v { font-size: 13px; font-weight: 800; color: var(--accent); display: block; }
        .l { font-size: 8px; text-transform: uppercase; color: #666; font-weight: 700; }

        #grid { 
            display: grid; grid-template-columns: repeat(7, 42px); grid-template-rows: repeat(7, 42px); 
            gap: 4px; padding: 10px; background: var(--brown); border-radius: 12px;
        }
        .cell { width: 42px; height: 42px; background: #fff9c4; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .cell img { width: 32px; height: 32px; }

        /* ADMIN PANEL [cite: 2026-03-22] */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .ledger-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .ledger-val { font-family: monospace; font-weight: 800; font-size: 16px; }

        #footer-admin { width: 100%; background: #000; color: #fff; padding: 12px 0; font-size: 9px; text-align: center; position: fixed; bottom: 0; cursor: pointer; }
        
        #ad-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="game-ad-area">AD SLOT 1 (HOME VIEW)</div>

    <div id="stats-row">
        <div class="stat-card"><span class="l">Saldo Atual</span><span class="v" id="bal-ui">€ 0.0000</span></div>
        <div class="stat-card"><span class="l">Ações</span><span class="v" id="act-ui">1</span></div>
    </div>

    <div id="grid"></div>

    <div class="game-ad-area">AD SLOT 2 (HOME VIEW)</div>

    <div id="footer-admin" onclick="openAdmin()">ADMIN: 5401881400 | v33.72 | LEDGER ACTIVE</div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2>Contabilidade Social</h2>
        <button onclick="closeAdmin()" style="background:var(--red); color:white; border:none; padding:10px; border-radius:8px;">X</button>
    </div>

    <div class="ledger-box">
        <div class="l">Ganhos (Visualização de Anúncios)</div>
        <div class="ledger-val" id="adm-gain" style="color:var(--accent)">€ 0.0000</div>
    </div>

    <div class="ledger-box" style="border-left-color: var(--red)">
        <div class="l">Gastos (Matches de Utilizadores)</div>
        <div class="ledger-val" id="adm-loss" style="color:var(--red)">€ 0.0000</div>
    </div>

    <div class="ledger-box" style="border-left-color: #333">
        <div class="l">Lucro Líquido (Saldo Sistema)</div>
        <div class="ledger-val" id="adm-profit">€ 0.0000</div>
    </div>
    
    <button onclick="addActions(10)" style="width:100%; padding:15px; border-radius:10px; border:none; background:#333; color:white; font-weight:800">FORÇAR +10 AÇÕES (TESTE)</button>
</div>

<div id="ad-modal">
    <div style="width:300px; height:250px; background:#222; border-radius:8px; margin-bottom:20px; display:flex; align-items:center; justify-content:center; color:#444">AD REWARD</div>
    <button onclick="rewardAd()" style="background:var(--accent); color:white; border:none; width:80%; padding:15px; border-radius:12px; font-weight:800">🎥 ASSISTIR E REVIVER</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const icons = ['🐄', '🐥', '🐝'];
    
    // VARIÁVEIS DE CONTABILIDADE [cite: 2026-03-30]
    let totalAdGains = 0.0020; // Começa com 0.0020 (2 anúncios na home ao abrir)
    let totalMatchCosts = 0.0000;
    let userBalance = 0.0000;
    let actions = 1;
    let cells = [];

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 49; i++) {
            const type = Math.floor(Math.random() * icons.length);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.type = type;
            cell.innerText = icons[type];
            cell.onclick = () => handleMatch(i);
            grid.appendChild(cell);
            cells.push(cell);
        }
        updateUI();
    }

    function handleMatch(idx) {
        if (actions <= 0) return;
        
        // Simulação de Match [cite: 2026-03-30]
        totalMatchCosts += 0.0005; // Custo por match realizado
        userBalance += 0.0010;     // Ganho do user (exemplo)
        actions--;
        
        updateUI();
        if (actions <= 0) document.getElementById('ad-modal').style.display='flex';
    }

    function rewardAd() {
        totalAdGains += 0.0010; // +1 Anúncio visualizado ao reviver [cite: 2026-03-30]
        actions = 5;
        document.getElementById('ad-modal').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal-ui').innerText = `€ ${userBalance.toFixed(4)}`;
        document.getElementById('act-ui').innerText = actions;
        
        // Atualiza Admin Ledger
        document.getElementById('adm-gain').innerText = `€ ${totalAdGains.toFixed(4)}`;
        document.getElementById('adm-loss').innerText = `€ ${totalMatchCosts.toFixed(4)}`;
        document.getElementById('adm-profit').innerText = `€ ${(totalAdGains - totalMatchCosts).toFixed(4)}`;
    }

    function openAdmin() { document.getElementById('admin-panel').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function addActions(n) { actions += n; updateUI(); }

    init();
</script>
</body>
</html>
