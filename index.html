<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Farm Heroes - Drag Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --sky: #4fc3f7; --grass: #8bc34a; --border: #5d4037; --panel: rgba(0, 0, 0, 0.5); }
        body { margin: 0; padding: 0; background: var(--sky); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; color: white; touch-action: none; }
        #header { width: 90%; background: var(--panel); margin-top: 10px; border-radius: 15px; display: flex; justify-content: space-around; padding: 10px; border: 3px solid var(--border); }
        .stat-value { font-size: 20px; font-weight: bold; }
        #mission-bar { display: flex; gap: 15px; margin: 10px 0; background: rgba(255,255,255,0.2); padding: 5px 20px; border-radius: 20px; }
        #grid { display: grid; grid-template-columns: repeat(7, 46px); grid-template-rows: repeat(7, 46px); gap: 4px; padding: 8px; background: var(--border); border-radius: 12px; position: relative; }
        .cell { width: 46px; height: 46px; background: #9ccc65; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 26px; user-select: none; transition: transform 0.1s; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { padding: 15px 40px; font-size: 18px; border-radius: 30px; background: #ff9800; color: white; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="header">
        <div style="text-align:center"><div>Moves</div><div id="moves-val" class="stat-value">20</div></div>
        <div style="text-align:center"><div>Score</div><div id="score-val" class="stat-value">0</div></div>
        <div style="text-align:center"><div>Best</div><div id="best-val" class="stat-value">0</div></div>
    </div>

    <div id="mission-bar">
        <span>🍎 <span id="m-apple">15</span></span>
        <span>🥕 <span id="m-carrot">15</span></span>
        <span>💧 <span id="m-water">15</span></span>
    </div>

    <div id="grid"></div>

    <div id="overlay">
        <h1 id="status-msg">Vitória!</h1>
        <button class="btn" onclick="location.reload()">JOGAR DE NOVO</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const grid = document.querySelector('#grid');
    const crops = ['🍎', '🥕', '💧', '🍓', '☀️'];
    const width = 7;
    let squares = [];
    let moves = 20;
    let score = 0;
    let mission = { '🍎': 15, '🥕': 15, '💧': 15 };

    function init() {
        for (let i = 0; i < width * width; i++) {
            const square = document.createElement('div');
            square.setAttribute('id', i);
            square.classList.add('cell');
            square.innerHTML = crops[Math.floor(Math.random() * crops.length)];
            grid.appendChild(square);
            squares.push(square);

            // Eventos de Arrastar (Mobile)
            square.addEventListener('touchstart', dragStart);
            square.addEventListener('touchend', dragEnd);
        }
        updateUI();
    }

    let startX, startY, startId;

    function dragStart(e) {
        startId = parseInt(this.id);
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        this.style.transform = "scale(1.2)";
        this.style.zIndex = "10";
    }

    function dragEnd(e) {
        this.style.transform = "scale(1)";
        this.style.zIndex = "1";
        
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const diffX = endX - startX;
        const diffY = endY - startY;

        let targetId = startId;

        // Detecta a direção do deslize (swipe)
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 30 && startId % width < width - 1) targetId = startId + 1; // Direita
            else if (diffX < -30 && startId % width > 0) targetId = startId - 1; // Esquerda
        } else {
            if (diffY > 30 && startId < width * (width - 1)) targetId = startId + width; // Baixo
            else if (diffY < -30 && startId >= width) targetId = startId - width; // Cima
        }

        if (targetId !== startId && moves > 0) {
            swap(startId, targetId);
            moves--;
            checkAllMatches();
            updateUI();
        }
    }

    function swap(id1, id2) {
        let temp = squares[id1].innerHTML;
        squares[id1].innerHTML = squares[id2].innerHTML;
        squares[id2].innerHTML = temp;
    }

    function checkAllMatches() {
        let matched = false;
        for (let i = 0; i < 49; i++) {
            let color = squares[i].innerHTML;
            if (color === '') continue;
            if (i % width < 5 && squares[i+1].innerHTML === color && squares[i+2].innerHTML === color) {
                [i, i+1, i+2].forEach(idx => squares[idx].setAttribute('match', true));
                matched = true;
            }
            if (i < 35 && squares[i+width].innerHTML === color && squares[i+width*2].innerHTML === color) {
                [i, i+width, i+width*2].forEach(idx => squares[idx].setAttribute('match', true));
                matched = true;
            }
        }
        if (matched) {
            tg.HapticFeedback.impactOccurred('medium');
            collect();
        }
    }

    function collect() {
        squares.forEach(s => {
            if (s.getAttribute('match')) {
                let type = s.innerHTML;
                if (mission[type] !== undefined) mission[type]--;
                s.innerHTML = '';
                s.removeAttribute('match');
                score += 15;
            }
        });
        setTimeout(applyGravity, 200);
    }

    function applyGravity() {
        for (let i = 0; i < width; i++) {
            let col = [];
            for (let j = 0; j < width; j++) {
                let val = squares[i + (j * width)].innerHTML;
                if (val !== '') col.push(val);
            }
            while (col.length < width) { col.unshift(crops[Math.floor(Math.random() * crops.length)]); }
            for (let j = 0; j < width; j++) { squares[i + (j * width)].innerHTML = col[j]; }
        }
        setTimeout(checkAllMatches, 300);
        updateUI();
    }

    function updateUI() {
        document.getElementById('moves-val').innerText = moves;
        document.getElementById('score-val').innerText = score;
        document.getElementById('m-apple').innerText = Math.max(0, mission['🍎']);
        document.getElementById('m-carrot').innerText = Math.max(0, mission['🥕']);
        document.getElementById('m-water').innerText = Math.max(0, mission['💧']);
        if (mission['🍎'] <= 0 && mission['🥕'] <= 0 && mission['💧'] <= 0) endGame(true);
        else if (moves <= 0) endGame(false);
    }

    function endGame(win) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('status-msg').innerText = win ? "VITÓRIA! 🌻" : "SEM MOVES! ⛈️";
    }

    init();
</script>
</body>
</html>
