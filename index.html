<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouro da Quinta v36.05 - ADMIN & MULTI-USER</title>
    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --blue: #4285f4; --brown: #8d6e63; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* CABEÇALHO DINÂMICO */
        #header { background: #fff; padding: 12px; display: flex; justify-content: space-around; border-bottom: 2px solid #eee; z-index: 100; }
        .stat { text-align: center; }
        .stat small { font-size: 10px; color: #888; display: block; text-transform: uppercase; }
        .stat b { font-size: 15px; color: var(--accent); }

        /* GRELHA INTERATIVA */
        #game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .grid { 
            display: grid; grid-template-columns: repeat(7, 42px); gap: 5px; 
            background: var(--brown); padding: 12px; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            pointer-events: auto !important; touch-action: none;
        }
        .cell { 
            width: 42px; height: 42px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.1s;
        }
        .cell:active { transform: scale(0.9); background: #fff176; }

        /* PAINEL ADMIN DETALHADO */
        #admin-panel { 
            display: none; position: fixed; inset: 0; background: #f4f7f6; z-index: 1000; 
            padding: 20px; overflow-y: auto; color: #333; 
        }
        .card { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h4 { margin: 0 0 10px 0; color: #666; font-size: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #999; padding-bottom: 8px; }
        td { padding: 8px 0; border-bottom: 1px solid #f9f9f9; }

        .btn-ad { background: var(--blue); color: white; border: none; padding: 15px 35px; border-radius: 12px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 0 #1565c0; }
        .btn-toggle { position: fixed; top: 10px; right: 10px; z-index: 500; background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 50px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<button class="btn-toggle" onclick="toggleAdmin()">COMANDO CENTRAL ⚙️</button>

<div id="header">
    <div class="stat"><small>ID</small><b id="ui-id">5401881400</b></div>
    <div class="stat"><small>SALDO</small><b id="ui-bal">€ 0.0000</b></div>
    <div class="stat"><small>AÇÕES</small><b id="ui-act">20</b></div>
</div>

<div id="game-container">
    <div class="grid" id="game-grid"></div>
    <button class="btn-ad" onclick="runAd()">VER ANÚNCIO (+10 AÇÕES)</button>
</div>

<div id="admin-panel">
    <h2 style="color:var(--accent); margin-bottom:20px;">Auditoria de Rede v36.05</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="card"><h4>Receita Total Ads</h4><p id="adm-rev" style="font-size:20px; font-weight:bold; color:var(--blue);">€ 0.0000</p></div>
        <div class="card"><h4>Passivo (Saldos)</h4><p id="adm-pass" style="font-size:20px; font-weight:bold; color:var(--accent);">€ 0.0000</p></div>
    </div>

    <div class="card">
        <h4>Simular Outro Utilizador [cite: 2026-03-22]</h4>
        <div style="display:flex; gap:10px;">
            <input type="number" id="input-id" placeholder="ID (ex: 808476)" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="switchUser()" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">ACEDER</button>
        </div>
        <button onclick="switchUser(Math.floor(Math.random()*1000000))" style="width:100%; margin-top:10px; padding:8px; background:#eee; border:none; border-radius:8px;">GERAR ID ALEATÓRIO</button>
    </div>

    <div class="card">
        <h4>Base de Dados de Utilizadores</h4>
        <table>
            <thead><tr><th>UTILIZADOR</th><th>SALDO</th><th>AÇÕES</th><th>ESTADO</th></tr></thead>
            <tbody id="user-table"></tbody>
        </table>
    </div>

    <button onclick="toggleAdmin()" style="width:100%; padding:18px; background:#333; color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px;">VOLTAR AO JOGO</button>
</div>

<script>
    const items = ['🥛', '🥚', '🍯', '🚜'];
    let currentId = "5401881400";
    let globalRev = 0;
    // BD Local para simular persistência de múltiplos users [cite: 2026-03-22]
    let usersDb = { "5401881400": { bal: 0, act: 20 } };

    function buildGrid() {
        const g = document.getElementById('game-grid');
        g.innerHTML = '';
        for(let i=0; i<49; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.innerHTML = `<span>${items[Math.floor(Math.random()*4)]}</span>`;
            
            // Fix para mobile: Previne o ghost-click e garante resposta [cite: 2026-03-22]
            c.addEventListener('touchstart', function(e){ e.preventDefault(); play(); }, {passive: false});
            c.addEventListener('mousedown', function(e){ play(); });
            
            g.appendChild(c);
        }
        refresh();
    }

    function play() {
        let u = usersDb[currentId];
        if(u.act > 0) {
            u.act--;
            u.bal += 0.0005;
            refresh();
        } else {
            alert("Ações esgotadas para este ID!");
        }
    }

    function runAd() {
        globalRev += 0.0010;
        usersDb[currentId].act += 10;
        alert("Anúncio visto por #" + currentId + " (+10 Ações)");
        refresh();
    }

    function switchUser(forcedId) {
        const id = forcedId || document.getElementById('input-id').value;
        if(!id) return;
        if(!usersDb[id]) usersDb[id] = { bal: 0, act: 20 };
        currentId = id.toString();
        refresh();
        if(!forcedId) toggleAdmin();
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function refresh() {
        const u = usersDb[currentId];
        document.getElementById('ui-id').innerText = currentId;
        document.getElementById('ui-bal').innerText = `€ ${u.bal.toFixed(4)}`;
        document.getElementById('ui-act').innerText = u.act;

        // Stats Admin
        document.getElementById('adm-rev').innerText = `€ ${globalRev.toFixed(4)}`;
        
        let totalPassivo = 0;
        let rows = "";
        for(let id in usersDb) {
            totalPassivo += usersDb[id].bal;
            rows += `<tr>
                <td>#${id}</td>
                <td><b>€ ${usersDb[id].bal.toFixed(4)}</b></td>
                <td>${usersDb[id].act}</td>
                <td style="color:var(--accent)">ONLINE</td>
            </tr>`;
        }
        document.getElementById('adm-pass').innerText = `€ ${totalPassivo.toFixed(4)}`;
        document.getElementById('user-table').innerHTML = rows;
    }

    window.onload = buildGrid;
</script>
</body>
</html>
