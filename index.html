<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egg Tycoon - Cotação em Tempo Real</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg: #f4f7f9;
            --primary: #2ecc71;
            --virtual: #f1c40f;
            --real: #2481cc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-bg);
            margin: 0; padding: 10px;
            color: #333;
            user-select: none;
        }

        /* Dashboards de Saldo */
        .dashboard { display: grid; gap: 8px; margin-bottom: 15px; }
        .balance-card {
            background: white; padding: 15px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .balance-card.real { border-top: 4px solid var(--real); }
        .balance-card.virt { border-top: 4px solid var(--virtual); }
        .balance-card span { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .balance-card b { font-size: 1.2rem; display: block; }

        /* Tabela de Cotação */
        .rates-info {
            background: #ffffff; border-radius: 15px; padding: 10px;
            margin-bottom: 15px; display: flex; justify-content: space-around;
            font-size: 0.8rem; border: 1px dashed #ccc;
        }
        .rate-tag { display: flex; align-items: center; gap: 5px; }

        /* Área de Venda Principal */
        .action-card {
            background: white; border-radius: 25px; padding: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .btn-sell {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 18px;
            cursor: pointer; font-weight: bold; position: relative;
        }
        .btn-sell:active { transform: scale(0.98); }
        .sell-preview {
            display: block; font-size: 0.75rem; font-weight: normal; opacity: 0.9;
            margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 4px;
        }

        .item-row {
            background: white; padding: 12px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="balance-card real">
            <div><span>Saldo Levantável</span><b id="real-bal">0.0000€</b></div>
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="35">
        </div>
        <div class="balance-card virt">
            <div><span>Capital da Quinta</span><b id="virt-bal">10.00🟡</b></div>
            <img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" width="30">
        </div>
    </div>

    <div class="rates-info">
        <div class="rate-tag">1 🥚 = <b style="color:var(--virtual)">0.50🟡</b></div>
        <div class="rate-tag">1 🥚 = <b style="color:var(--real)">0.0001€</b></div>
    </div>

    <div class="action-card">
        <div style="margin-bottom: 15px; font-size: 1.1rem;">🥚 <b id="egg-count">0</b> Ovos em Stock</div>
        
        <button class="btn-sell" id="btn-sell" onclick="sell()">
            VENDER PRODUÇÃO
            <span class="sell-preview" id="sell-preview">Ganho previsto: 0.00🟡 | 0.0000€</span>
        </button>

        <button onclick="watchAd()" style="margin-top: 10px; background: #e67e22; color: white; border: none; width: 100%; padding: 12px; border-radius: 15px; font-weight: bold;">
            📺 REPOR RAÇÃO (AD)
        </button>
    </div>

    <h3 style="padding-left: 10px;">Mercado</h3>
    <div id="shop">
        <div class="item-row">
            <span>🐔 Nova Galinha</span>
            <button class="buy-btn" id="buy-chk" onclick="buy('chk')" style="background:#f8f9fa; border:1px solid #ddd; padding:8px 15px; border-radius:10px; font-weight:bold;">
                <span id="price-chk">20</span>🟡
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            eggs: 0, virtual: 10.0, real: 0.0, chickens: 1,
            rateV: 0.50, // Valor Virtual por ovo
            rateR: 0.0001, // Valor Real por ovo
            priceChk: 20
        };

        function update() {
            document.getElementById('real-bal').innerText = state.real.toFixed(4) + "€";
            document.getElementById('virt-bal').innerText = state.virtual.toFixed(2) + "🟡";
            document.getElementById('egg-count').innerText = Math.floor(state.eggs);
            
            // Atualizar Previsão no Botão
            let vGain = Math.floor(state.eggs) * state.rateV;
            let rGain = Math.floor(state.eggs) * state.rateR;
            document.getElementById('sell-preview').innerText = 
                `Ganho previsto: ${vGain.toFixed(2)}🟡 | ${rGain.toFixed(4)}€`;

            document.getElementById('btn-sell').disabled = (state.eggs < 1);
            document.getElementById('price-chk').innerText = state.priceChk;
            document.getElementById('buy-chk').disabled = (state.virtual < state.priceChk);
        }

        // Loop de Produção
        setInterval(() => {
            state.eggs += (state.chickens * 0.1);
            update();
        }, 1000);

        function sell() {
            let qty = Math.floor(state.eggs);
            state.virtual += (qty * state.rateV);
            state.real += (qty * state.rateR);
            state.eggs = 0;
            tg.HapticFeedback.impactOccurred('light');
            update();
        }

        function buy(t) {
            if(state.virtual >= state.priceChk) {
                state.virtual -= state.priceChk;
                state.chickens++;
                state.priceChk = Math.round(state.priceChk * 1.4);
                update();
            }
        }

        function watchAd() {
            tg.showAlert("Ração abastecida! +0.0010€ bónus por ver o anúncio.");
            state.real += 0.0010; // CPM direto
            update();
        }

        update();
    </script>
</body>
</html>
