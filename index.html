<div class="card">
    <div class="flex-between">
        <div>
            <span class="label">Saldo Real <span id="adm-badge"></span></span>
            <div class="val-real" id="real-bal">0.0000€</div>
            <button id="withdraw-btn" 
                    style="margin-top:8px; background:var(--google-blue); color:white; border:none; padding:5px 12px; border-radius:8px; font-size:0.7rem; cursor:pointer; display:none;" 
                    onclick="requestWithdraw()">
                PEDIR LEVANTAMENTO (PAYPAL)
            </button>
        </div>
        <div style="text-align: right;">
            <span class="label">Capital Quinta</span>
            <div class="val-virt" id="virt-bal">10.00🟡</div>
        </div>
    </div>
</div>

<script>
    // Adicionar esta lógica na função updateUI()
    function updateUI() {
        // ... (resto do código anterior)
        
        // Mostrar botão de levantamento se houver saldo real > 0
        const wBtn = document.getElementById('withdraw-btn');
        if (state.real > 0) {
            wBtn.style.display = 'block';
        } else {
            wBtn.style.display = 'none';
        }
    }

    function requestWithdraw() {
        tg.showConfirm(`Deseja levantar ${state.real.toFixed(4)}€ para a sua conta PayPal?`, (ok) => {
            if(ok) {
                tg.showAlert("Pedido enviado! O Admin processará o pagamento em breve.");
                // Aqui o sistema enviaria o ID e valor para a tua lista "PayPal Pendentes"
                state.real = 0;
                updateUI();
            }
        });
    }
</script>
