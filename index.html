        }

<script>
    const tg = window.Telegram.WebApp;
    let moves = 21;

    function init() {
        tg.ready(); tg.expand();
        // Renderizar tabuleiro...
        updateUI();
    }

    // COMO APARECE O ANÚNCIO NO REVIVER
    function checkMoves() {
        if (moves <= 0) {
            tg.showConfirm("A colheita parou! Deseja validar o certificado de transporte para ganhar +10 Ações?", (ok) => {
                if (ok) {
                    // Aqui usas o DIRECT LINK da Adsterra
                    window.open('URL_DO_TEU_DIRECT_LINK_AQUI', '_blank');
                    
                    // O jogo dá o prémio após o clique (estratégia de retenção)
                    setTimeout(() => {
                        moves = 10;
                        updateUI();
                        tg.showAlert("Certificado validado! +10 Ações.");
                    }, 1000);
                }
            });
        }
    }

    function updateUI() {
        document.getElementById('mov').innerText = moves;
        checkMoves();
    }

    init();
</script>
