<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egg Tycoon v5.0 - Ultimate Expansion</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg: #f0f4f7; --primary: #2ecc71; --virtual: #f1c40f; --real: #2481cc; }
        body { font-family: sans-serif; background: var(--tg-bg); margin: 0; padding: 10px; color: #333; overflow-x: hidden; }
        
        /* Layout de Saldo */
        .wallet-grid { display: grid; gap: 8px; margin-bottom: 12px; }
        .card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        
        /* Painel Central */
        .farm-container { background: white; border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .feed-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; font-weight: bold; color: #e67e22; }
        .progress-bar { background: #eee; height: 24px; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #ddd; }
        #feed-bar { height: 100%; background: linear-gradient(90deg, #e67e22, #f39c12); width: 100%; transition: width 0.3s linear; }
        .feed-text-overlay { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-weight: bold; }

        /* Estilo da Loja */
        .shop-section { margin-top: 20px; padding-bottom: 30px; }
        .shop-item { background: white; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .shop-icon { font-size: 1.8rem; background: #f8f9fa; padding: 8px; border-radius: 12px; }
        .shop-info { flex-grow: 1; }
        .shop-info h4 { margin: 0; font-size: 0.9rem; color: #2c3e50; }
        .shop-info p { margin: 2px 0 0; font-size: 0.7rem; color: #7f8c8d; }
        .buy-btn { background: #fff; border: 1px solid var(--virtual); padding: 8px 12px; border-radius: 10px; font-weight: bold; min-width: 80px; transition: 0.2s; }
        .buy-btn:disabled { opacity: 0.5; border-color: #ccc; }

        .btn { border: none; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 8px; }
        .btn-sell { background: var(--primary); color: white; }
        .btn-ad { background: #e67e22; color: white; }
    </style>
</head>
<body>

    <div class="wallet-grid">
        <div class="card" style="border-left-color: var(--real);">
            <div><small>SALDO REAL</small><br><b id="real-bal">0.0000€</b></div>
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="30">
        </div>
        <div class="card" style="border-left-color: var(--virtual);">
            <div><small>CAPITAL DA QUINTA</small><br><b id="virt-bal">10.00🟡</b></div>
            <img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" width="25">
        </div>
    </div>

    <div class="farm-container">
        <div style="display: flex; justify-content: space-around; margin-bottom: 15px; font-weight: bold;">
            <span>🥚 Stock: <span id="egg-count">0</span></span>
            <span>🐔 Aves: <span id="chk-count">1</span>/<span id="chk-max">5</span></span>
        </div>

        <div class="feed-header">
            <span>Ração em Stock</span>
            <span id="feed-weight">5.000 kg</span>
        </div>
        <div class="progress-bar">
            <div id="feed-bar"></div>
            <div class="feed-text-overlay" id="feed-pct">100%</div>
        </div>
        <p style="font-size: 0.65rem; color: #888; margin-top: 5px;">Consumo: <span id="consume-rate">20</span>g /seg</p>
        
        <button class="btn btn-sell" onclick="sell()">VENDER PRODUÇÃO<br><small id="preview">Previsto: 0.00🟡 | 0.0000€</small></button>
        <button class="btn btn-ad" onclick="watchAd()">📺 REPOR RAÇÃO (AD)</button>
    </div>

    <div class="shop-section">
        <h3 style="margin-left: 5px;">Mercado de Expansão</h3>
        
        <div id="shop-list">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let state = {
            eggs: 0, virtual: 10, real: 0, chickens: 1, coops: 1,
            feedMax: 5000, feedCurrent: 5000,
            rateV: 0.50, rateR: 0.0001, prodSpeed: 0.1,
            upgrades: {
                chk: { n: "Nova Galinha", d: "+Produção de ovos", p: 20, i: "🐔" },
                coop: { n: "Galinheiro", d: "+5 Vagas de aves", p: 100, i: "🏠" },
                silo: { n: "Silo Industrial", d: "+5kg Cap. Ração", p: 150, i: "🏗️" },
                light: { n: "Iluminação", d: "+20% Produtividade", p: 200, i: "💡" },
                bio: { n: "Selo Bio", d: "+15% Valor Real (€)", p: 300, i: "🌿" },
                clean: { n: "Auto-Limpeza", d: "-10% Gasto Ração", p: 250, i: "🧹" }
            }
        };

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            for (let id in state.upgrades) {
                let up = state.upgrades[id];
                list.innerHTML += `
                    <div class="shop-item">
                        <div class="shop-icon">${up.i}</div>
                        <div class="shop-info"><h4>${up.n}</h4><p>${up.d}</p></div>
                        <button class="buy-btn" id="b-${id}" onclick="buy('${id}')">${up.p}🟡</button>
                    </div>`;
            }
        }

        function update() {
            document.getElementById('real-bal').innerText = state.real.toFixed(4) + "€";
            document.getElementById('virt-bal').innerText = state.virtual.toFixed(2) + "🟡";
            document.getElementById('egg-count').innerText = Math.floor(state.eggs);
            document.getElementById('chk-count').innerText = state.chickens;
            document.getElementById('chk-max').innerText = state.coops * 5;
            
            let pct = (state.feedCurrent / state.feedMax) * 100;
            document.getElementById('feed-bar').style.width = pct + "%";
            document.getElementById('feed-pct').innerText = Math.ceil(pct) + "%";
            document.getElementById('feed-weight').innerText = (state.feedCurrent / 1000).toFixed(3) + " kg";
            document.getElementById('consume-rate').innerText = (state.chickens * 20).toFixed(0);

            let vG = Math.floor(state.eggs) * state.rateV;
            let rG = Math.floor(state.eggs) * state.rateR;
            document.getElementById('preview').innerText = `Previsto: ${vG.toFixed(2)}🟡 | ${rG.toFixed(4)}€`;
            
            for (let id in state.upgrades) {
                let btn = document.getElementById('b-' + id);
                if(btn) {
                    let canBuy = state.virtual >= state.upgrades[id].p;
                    if(id === 'chk' && state.chickens >= state.coops * 5) canBuy = false;
                    btn.disabled = !canBuy;
                }
            }
        }

        setInterval(() => {
            if(state.feedCurrent > 0) {
                state.feedCurrent = Math.max(0, state.feedCurrent - (20 * state.chickens));
                state.eggs += (state.chickens * state.prodSpeed);
                update();
            }
        }, 1000);

        function sell() {
            let qty = Math.floor(state.eggs);
            if(qty >= 1) {
                state.virtual += (qty * state.rateV);
                state.real += (qty * state.rateR);
                state.eggs = 0;
                tg.HapticFeedback.impactOccurred('medium');
                update();
            }
        }

        function buy(id) {
            let up = state.upgrades[id];
            if(state.virtual >= up.p) {
                state.virtual -= up.p;
                if(id === 'chk') state.chickens++;
                if(id === 'coop') state.coops++;
                if(id === 'silo') state.feedMax += 5000;
                if(id === 'light') state.prodSpeed *= 1.2;
                if(id === 'bio') state.rateR *= 1.15;
                if(id === 'clean') state.feedCurrent = Math.min(state.feedMax, state.feedCurrent * 1.1); // Simulação de eficiência
                
                up.p = Math.round(up.p * 1.6);
                renderShop();
                update();
            }
        }

        function watchAd() {
            tg.showConfirm("Assistir anúncio para repor a ração?", (ok) => {
                if(ok) { state.feedCurrent = state.feedMax; update(); }
            });
        }

        renderShop();
        update();
    </script>
</body>
</html>
