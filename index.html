<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ouro da Quinta v33.38 - Ultra Stability</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script async src="https://pl29012868.profitablecpmratenetwork.com/7b/31/43/7b314394efd9e2e979501f8a43f83bcb.js"></script>

    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; 
        }

        /* Contentor Principal: Ocupa exatamente a altura do ecrã */
        #game-viewport {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100vw; position: relative; padding: 10px 0;
        }

        /* Dashboard Superior */
        #ui-top { width: 92%; flex-shrink: 0; z-index: 20; }
        .stats-card { 
            background: var(--white); border-radius: 12px; display: flex; 
            justify-content: space-around; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .val { font-size: 16px; font-weight: 800; color: var(--accent); }
        .label { font-size: 9px; text-transform: uppercase; color: #5f6368; font-weight: 700; }

        #mission-bar { 
            background: var(--white); padding: 5px 15px; border-radius: 20px; 
            margin: 8px auto; font-size: 12px; font-weight: 800; display: table;
        }

        /* Tabuleiro: Tamanho fixo e centralizado */
        #grid-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; min-height: 320px; z-index: 10;
        }
        #grid { 
            display: grid; grid-template-columns: repeat(7, 40px); grid-template-rows: repeat(7, 40px); 
            gap: 4px; padding: 10px; background: #8d6e63; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .cell { width: 40px; height: 40px; background: #fff9c4; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .cell img { width: 30px; height: 30px; pointer-events: none; }

        /* Espaço para Anúncio Nativo: Não empurra o layout */
        #ad-slot { width: 100%; height: 60px; overflow: hidden; margin: 5px 0; flex-shrink: 0; }

        /* Rodapé de Boosters */
        #ui-bottom { width: 100%; padding-bottom: 70px; z-index: 20; flex-shrink: 0; }
        .booster-row { display: flex; justify-content: center; gap: 8px; }
        .btn-b { 
            background: var(--white); padding: 8px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; 
            min-width: 75px; border: 1px solid #ddd; position: relative;
        }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 800; }

        /* Admin Bar fixo no fundo */
        #admin-bar { 
            position: fixed; bottom: 0; width: 100%; background: #202124; 
            color: white; padding: 10px 0; font-size: 10px; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div id="ui-top">
        <div class="stats-card">
            <div style="text-align:center"><div class="label">Nível</div><div id="lvl" class="val">1</div></div>
            <div style="text-align:center"><div class="label">Saldo</div><div id="bal" class="val">€ 0.0000</div></div>
            <div style="text-align:center"><div class="label">Ações</div><div id="mov" class="val" style="color:var(--red)">21</div></div>
        </div>
        <div id="mission-bar">🧀 10 | 🍯 5 | 🥚 12</div>
    </div>

    <div id="grid-container">
        <div id="grid"></div>
    </div>

    <div id="ad-slot">
        <div id="container-5a080aa61604cd40501f4a250aa83ca6"></div>
        <script async="async" data-cfasync="false" src="https://pl29012865.profitablecpmratenetwork.com/5a080aa61604cd40501f4a250aa83ca6/invoke.js"></script>
    </div>

    <div id="ui-bottom">
        <div class="booster-row">
            <div class="btn-b"><img src="https://cdn-icons-png.flaticon.com/128/598/598219.png" width="22"><b>BOMBA</b><div class="badge">2</div></div>
            <div class="btn-b"><img src="https://cdn-icons-png.flaticon.com/128/940/940561.png" width="22"><b>TRATOR</b><div class="badge">2</div></div>
            <div class="btn-b"><img src="https://cdn-icons-png.flaticon.com/128/2210/2210041.png" width="22"><b>PÁ</b><div class="badge">3</div></div>
        </div>
    </div>

    <div id="admin-bar">ADMIN: 5401881400 | TOTAL APP: € 0.0000</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const icons = [
        'https://cdn-icons-png.flaticon.com/128/802/802271.png', 'https://cdn-icons-png.flaticon.com/128/3050/3050181.png',
        'https://cdn-icons-png.flaticon.com/128/837/837560.png', 'https://cdn-icons-png.flaticon.com/128/2909/2909774.png',
        'https://cdn-icons-png.flaticon.com/128/3104/3104618.png'
    ];

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const idx = Math.floor(Math.random() * icons.length);
            cell.innerHTML = `<img src="${icons[idx]}">`;
            grid.appendChild(cell);
        }
    }
    init();

    // Sistema de Reviver via Direct Link (Acionado quando ações < 1)
    function checkGameOver(moves) {
        if (moves <= 0) {
            tg.showConfirm("Sem ações! Validar transporte para ganhar +10?", (ok) => {
                if(ok) window.open('URL_DO_TEU_DIRECT_LINK', '_blank');
            });
        }
    }
</script>
</body>
</html>
