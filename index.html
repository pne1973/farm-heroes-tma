<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <style>
        :root { --bg: #fdfae5; --accent: #2e7d32; --red: #d93025; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-between; }

        /* Anúncios Fixos */
        #top-ad, #bottom-ad { width: 320px; height: 50px; overflow: hidden; flex-shrink: 0; }
        #top-ad { margin-top: 5px; }
        #bottom-ad { margin-bottom: 35px; }

        /* Dashboard */
        #stats { width: 95%; background: var(--white); border-radius: 12px; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 10; }
        .v { font-size: 16px; font-weight: 800; color: var(--accent); }
        .l { font-size: 9px; text-transform: uppercase; color: #666; font-weight: 700; }

        /* Área de Jogo Centralizada */
        #game-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; position: relative; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(7, 38px); grid-template-rows: repeat(7, 38px); 
            gap: 4px; padding: 10px; background: #8d6e63; border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15); position: relative;
        }
        .cell { 
            width: 38px; height: 38px; background: #fff9c4; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.2s, opacity 0.3s; position: relative;
        }
        .cell img { width: 28px; height: 28px; pointer-events: none; }

        /* EFEITO DE EXPLOSÃO */
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.8; filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }
        .exploding { animation: explode 0.4s ease-out forwards; z-index: 10; }

        /* Boosters */
        #boosters { display: flex; gap: 8px; margin-top: 10px; }
        .b-btn { background: var(--white); padding: 6px 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .b-btn img { width: 18px; height: 18px; }

        #admin { position: fixed; bottom: 0; width: 100%; background: #202124; color: #fff; padding: 8px 0; font-size: 10px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app-shell">
    <div id="top-ad">
        <script type="text/javascript">atOptions = {'key':'52802f8e0e936960203e1401659b0395','format':'iframe','height':50,'width':320,'params':{}};</script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/52802f8e0e936960203e1401659b0395/invoke.js"></script>
    </div>

    <div id="stats">
        <div style="text-align:center"><span class="l">Nível</span><span class="v">1</span></div>
        <div style="text-align:center"><span class="l">Saldo EUR</span><span class="v">€ 0.0000</span></div>
        <div style="text-align:center"><span class="l">Ações</span><span class="v" style="color:var(--red)">21</span></div>
    </div>

    <div id="game-zone">
        <div id="grid"></div>
        <div id="boosters">
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/598/598219.png">BOMBA</div>
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/940/940561.png">TROCA</div>
            <div class="b-btn"><img src="https://cdn-icons-png.flaticon.com/128/2210/2210041.png">PÁ</div>
        </div>
    </div>

    <div id="bottom-ad">
        <script type="text/javascript">atOptions = {'key':'52802f8e0e936960203e1401659b0395','format':'iframe','height':50,'width':320,'params':{}};</script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/52802f8e0e936960203e1401659b0395/invoke.js"></script>
    </div>

    <div id="admin">ADMIN: 5401881400 | ANIMALS V1</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // NOVO CONJUNTO DE ÍCONES: ANIMAIS DA QUINTA
    const farmAnimals = [
        'https://cdn-icons-png.flaticon.com/128/1998/1998592.png', // Vaca (Leite)
        'https://cdn-icons-png.flaticon.com/128/1998/1998610.png', // Galinha (Ovo)
        'https://cdn-icons-png.flaticon.com/128/1998/1998620.png', // Ovelha (Lã)
        'https://cdn-icons-png.flaticon.com/128/1998/1998601.png', // Porco (Trufas/Ouro)
        'https://cdn-icons-png.flaticon.com/128/4028/4028682.png'  // Abelha (Mel Premiado)
    ];
    
    let dragSrcEl = null;
    let cells = [];

    function init() {
        tg.ready(); tg.expand();
        const grid = document.getElementById('grid');
        for (let i = 0; i < 49; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            cell.dataset.type = Math.floor(Math.random() * farmAnimals.length);
            cell.innerHTML = `<img src="${farmAnimals[cell.dataset.type]}">`;
            
            // Ativar Drag and Drop
            cell.draggable = true;
            cell.addEventListener('dragstart', handleDragStart);
            cell.addEventListener('dragover', handleDragOver);
            cell.addEventListener('drop', handleDrop);
            cell.addEventListener('dragend', handleDragEnd);
            
            grid.appendChild(cell);
            cells.push(cell);
        }
    }

    // MECÂNICA DRAG AND DROP
    function handleDragStart(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        this.style.opacity = '0.5';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
    }

    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        
        if (dragSrcEl !== this) {
            const idx1 = parseInt(dragSrcEl.dataset.idx);
            const idx2 = parseInt(this.dataset.idx);
            const isNeighbor = [1, -1, 7, -7].includes(idx1 - idx2);

            if (isNeighbor) {
                // Troca visual e de dados
                const tempType = dragSrcEl.dataset.type;
                const tempImg = dragSrcEl.innerHTML;

                dragSrcEl.dataset.type = this.dataset.type;
                dragSrcEl.innerHTML = this.innerHTML;

                this.dataset.type = tempType;
                this.innerHTML = tempImg;

                tg.HapticFeedback.notificationOccurred('success');
                checkMatches(); // Verifica matches após a troca
            }
        }
        return false;
    }

    function handleDragEnd() {
        this.style.opacity = '1';
    }

    // LÓGICA DE EXPLOSÃO (MATCHES)
    function checkMatches() {
        let matches = new Set();

        // Verificar Horizontais
        for (let r = 0; r < 7; r++) {
            for (let c = 0; c < 5; c++) {
                let i = r * 7 + c;
                if (cells[i].dataset.type === cells[i+1].dataset.type && cells[i].dataset.type === cells[i+2].dataset.type) {
                    matches.add(i); matches.add(i+1); matches.add(i+2);
                }
            }
        }

        // Verificar Verticais
        for (let c = 0; c < 7; c++) {
            for (let r = 0; r < 5; r++) {
                let i = r * 7 + c;
                if (cells[i].dataset.type === cells[i+7].dataset.type && cells[i].dataset.type === cells[i+14].dataset.type) {
                    matches.add(i); matches.add(i+7); matches.add(i+14);
                }
            }
        }

        if (matches.size > 0) {
            tg.HapticFeedback.notificationOccurred('warning');
            matches.forEach(i => {
                cells[i].classList.add('exploding');
                // Remove a peça após a animação
                setTimeout(() => {
                    cells[i].classList.remove('exploding');
                    cells[i].dataset.type = Math.floor(Math.random() * farmAnimals.length);
                    cells[i].innerHTML = `<img src="${farmAnimals[cells[i].dataset.type]}">`;
                }, 400);
            });
            // Recarrega o tabuleiro (queda de peças) simplificado
            setTimeout(checkMatches, 600); 
        }
    }

    init();
</script>
</body>
</html>
